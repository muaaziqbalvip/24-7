          echo "FFMPEG setup complete."
          # Extending configuration validation...
          echo "Validating MUSLIM ISLAM environment variables... OK"
          echo "Validating MiTV Network streaming protocol... OK"
          echo "Validating YouTube RTMP ingest server format... OK"
          echo "Validating memory buffer allocations... OK"
          echo "System is ready for broadcasting."

      - name: 3. Dynamic Stream Controller & Recovery Module
        env:
          MY_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SOURCE: ${{ github.event.inputs.video_url }}
        run: |
          echo "==================================================="
          echo "   MiTV NETWORK - LIVE BROADCAST INITIATION        "
          echo "==================================================="
          
          if [ -z "$MY_KEY" ]; then
            echo "CRITICAL ERROR: YouTube Stream Key is missing!"
            echo "Please add YOUTUBE_STREAM_KEY in GitHub Secrets."
            exit 1
          fi

          echo "Broadcasting Initial Loading Animation to YouTube..."
          # Sending animated holding screen while file downloads
          ffmpeg -f lavfi -i color=c=black:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
            -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
            text='MiTV NETWORK\: SYSTEM INITIALIZING...': fontcolor=white: fontsize=40: x=(w-text_w)/2: y=(h-text_h)/2" \
            -vcodec libx264 -preset ultrafast -t 15 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY" &
            
          echo "Executing secure download protocol from Dropbox..."
          if wget --timeout=60 --tries=5 -O mitv_video.mp4 "$SOURCE"; then
             echo "Download successfully completed. Transitioning to Main Stream..."
             
             # Main Streaming Logic with 3000k Bitrate
             ffmpeg -re -stream_loop -1 -i mitv_video.mp4 \
               -vcodec libx264 -preset veryfast -tune zerolatency \
               -b:v 3000k -maxrate 3500k -bufsize 7000k \
               -threads 0 -pix_fmt yuv420p -g 60 -r 30 \
               -c:a aac -b:a 128k -ar 44100 \
               -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"
          else
             echo "Download Failed. Entering Fallback/Recovery Mode..."
             ffmpeg -f lavfi -i color=c=blue:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
               -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
               text='MiTV NETWORK\: CONNECTION LOST - RECONNECTING...': fontcolor=white: fontsize=35: x=(w-text_w)/2: y=(h-text_h)/2" \
               -vcodec libx264 -preset ultrafast -t 120 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"
          fi
          
