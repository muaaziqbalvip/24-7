name: 24/7 MiTV Network (Fixed Protocol & Bits)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Apni Video ka Link'
        required: true
        default: 'https://youtu.be/B0Rp1BmC-gQ'
      stream_key:
        description: 'YouTube Stream Key'
        required: true

jobs:
  mitv_smooth_stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v3

      - name: 2. Install Professional Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Streaming Logic (Bitrate & Protocol Fix)
        env:
          MY_KEY: ${{ github.event.inputs.stream_key }}
          YT_URL: ${{ github.event.inputs.youtube_url }}
        run: |
          echo "Starting MiTV Network Stream..."
          
          # 'Protocol Not Found' fix karne ke liye humne variable handling behtar ki hai
          # Bitrate ko force kiya hai taake YouTube ki 2500k wali warning khatam ho jaye
          
          VIDEO_LINK=$(yt-dlp -f "best[ext=mp4]" -g "$YT_URL")
          
          ffmpeg -re -stream_loop -1 -i "$VIDEO_LINK" \
          -c:v libx264 -preset ultrafast -tune zerolatency \
          -b:v 3000k -maxrate 3500k -bufsize 7000k \
          -pix_fmt yuv420p -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"

      - name: 4. Auto-Restart on Failure
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\": {\"youtube_url\":\"${{ github.event.inputs.youtube_url }}\", \"stream_key\":\"${{ github.event.inputs.stream_key }}\"}}"
