name: 24/7 MiTV Network Streamer Ultra-Fast

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-restart
  workflow_dispatch:      # User se input lene ke liye
    inputs:
      video_url:
        description: 'Dropbox Direct Link'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'
      stream_key:
        description: 'YouTube Stream Key'
        required: false

jobs:
  mitv_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup FFMPEG
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Execute Live Stream
        env:
          INPUT_KEY: ${{ github.event.inputs.stream_key }}
          SECRET_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          FINAL_KEY="${INPUT_KEY:-$SECRET_KEY}"
          
          echo "MiTV Network: Starting Stable Stream Logic..."
          
          # Is command mein Bits aur Buffer ka hisab YouTube ke standard ke mutabiq hai
          ffmpeg -re -stream_loop -1 -i "$VIDEO_URL" \
          -c:v libx264 -preset ultrafast -tune zerolatency \
          -b:v 1500k -maxrate 1500k -bufsize 3000k \
          -pix_fmt yuv420p -g 30 -r 30 \
          -c:a aac -b:a 96k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$FINAL_KEY"

      - name: Auto-Restart Trigger
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main", "inputs": {"video_url":"${{ github.event.inputs.video_url }}"}}'
