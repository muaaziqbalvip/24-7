name: 24/7 MiTV Network Ultra-Smooth

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Dropbox Direct Link'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'
      stream_key:
        description: 'YouTube Stream Key'
        required: true

jobs:
  mitv_stream_logic:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v3

      - name: 2. Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget fonts-liberation

      - name: 3. Background Download & Live Status
        env:
          MY_KEY: ${{ github.event.inputs.stream_key }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          # Pehle 30 seconds ke liye Animated Loading Screen chalao
          echo "MiTV: Starting Animated Loading Screen..."
          ffmpeg -f lavfi -i color=c=black:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
            -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
            text='MiTV NETWORK\: CONNECTING TO SERVER...': fontcolor=white: fontsize=40: x=(w-text_w)/2: y=(h-text_h)/2-40, \
            drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
            text='Optimizing Bitrate for Smooth Streaming': fontcolor=yellow: fontsize=20: x=(w-text_w)/2: y=(h-text_h)/2+20" \
            -vcodec libx264 -preset ultrafast -tune zerolatency -b:v 2500k \
            -pix_fmt yuv420p -t 45 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY" &

          # Video download logic with retries
          echo "MiTV: Downloading source file..."
          wget -q --show-progress --timeout=30 --tries=10 -O video.mp4 "$VIDEO_URL"

      - name: 4. Final Smooth Stream (Anti-Bot Settings)
        env:
          MY_KEY: ${{ github.event.inputs.stream_key }}
        run: |
          # Yahan hum Bits aur Quality ko professional level par set kar rahe hain
          # -g 60 YouTube ke liye perfect 2-second keyframe hai
          # -b:v 3000k ensures "Excellent Connection" in YouTube Studio
          
          echo "MiTV: Starting Main 24/7 Stream..."
          ffmpeg -re -stream_loop -1 -i video.mp4 \
            -vcodec libx264 -preset veryfast -tune zerolatency \
            -b:v 3000k -maxrate 3500k -bufsize 7000k \
            -threads 0 -pix_fmt yuv420p -g 60 -r 30 \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY" || \
          (echo "Error detected! Showing Animated Recovery..." && \
          ffmpeg -f lavfi -i color=c=blue:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
            -vf "drawtext=text='MiTV NETWORK\: RECOVERING STREAM...':fontcolor=white:fontsize=45:x=(w-text_w)/2:y=(h-text_h)/2" \
            -t 30 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY")

      - name: 5. Force Restart (GitHub Safe Mode)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\": {\"video_url\":\"${{ github.event.inputs.video_url }}\", \"stream_key\":\"${{ github.event.inputs.stream_key }}\"}}"
