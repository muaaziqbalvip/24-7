      - name: 4. Secure Continuous Integration Restart
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Initiating Workflow Auto-Restart Sequence..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\": {\"video_url\":\"${{ github.event.inputs.video_url }}\"}}"
          echo "Restart sequence triggered."
