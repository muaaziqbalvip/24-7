name: MiTV Network 24/7 Permanent Fix

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link (Dropbox with &raw=1)'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'
      stream_key:
        description: 'YouTube Stream Key'
        required: true

jobs:
  mitv_permanent_live:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Repo & Tools
        uses: actions/checkout@v3

      - name: 2. Install Professional Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget fonts-liberation
          echo "MiTV Environment Ready."

      - name: 3. Smart Logic: Download & Stream
        env:
          MY_KEY: ${{ github.event.inputs.stream_key }}
          SOURCE: ${{ github.event.inputs.video_url }}
        run: |
          # Sabse pehle YouTube par 'System Initializing' ka animated message bhejo
          echo "Starting Initial Broadcast..."
          ffmpeg -f lavfi -i color=c=black:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
            -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
            text='MiTV NETWORK\: STARTING SYSTEM...': fontcolor=white: fontsize=40: x=(w-text_w)/2: y=(h-text_h)/2" \
            -vcodec libx264 -preset ultrafast -t 20 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY" &

          # Video Download Logic
          echo "Downloading High-Quality Video Source..."
          if wget --timeout=60 --tries=10 -O mitv_video.mp4 "$SOURCE"; then
             echo "Download Success. Starting Main Stream..."
             
             # Main Stream Logic (Bitrate 3000k for Excellent Health)
             ffmpeg -re -stream_loop -1 -i mitv_video.mp4 \
               -vcodec libx264 -preset veryfast -tune zerolatency \
               -b:v 3000k -maxrate 3500k -bufsize 7000k \
               -threads 0 -pix_fmt yuv420p -g 60 -r 30 \
               -c:a aac -b:a 128k -ar 44100 \
               -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"
          else
             echo "Download Failed! Showing Error Screen on Stream..."
             # Agar download fail ho jaye to YouTube par ye message chalta rahega
             ffmpeg -f lavfi -i color=c=blue:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
               -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
               text='MiTV NETWORK\: CONNECTION ERROR - RETRYING': fontcolor=white: fontsize=40: x=(w-text_w)/2: y=(h-text_h)/2" \
               -vcodec libx264 -preset ultrafast -t 600 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"
          fi

      - name: 4. Infinite Auto-Restart (Anti-Stop)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ye step ensure karega ke workflow kabhi red na ho
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\": {\"video_url\":\"${{ github.event.inputs.video_url }}\", \"stream_key\":\"${{ github.event.inputs.stream_key }}\"}}"
