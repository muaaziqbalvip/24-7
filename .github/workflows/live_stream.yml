name: 24/7 MiTV Network Streamer Professional

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-trigger
  workflow_dispatch:      # Manual input ke liye
    inputs:
      video_url:
        description: 'Dropbox Direct Link ya MP4 URL'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'
      stream_key:
        description: 'YouTube Stream Key'
        required: false
      use_loop:
        description: 'Loop video? (true/false)'
        required: true
        default: 'true'

jobs:
  mitv_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # 6 ghante se pehle gracefully stop hoga
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup FFMPEG
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Execute Live Stream
        env:
          INPUT_KEY: ${{ github.event.inputs.stream_key }}
          SECRET_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          LOOP_MODE: ${{ github.event.inputs.use_loop }}
        run: |
          # Stream Key select karna
          FINAL_KEY="${INPUT_KEY:-$SECRET_KEY}"
          
          # Loop command agar true ho
          LOOP_CMD=""
          if [ "$LOOP_MODE" = "true" ]; then
            LOOP_CMD="-stream_loop -1"
          fi

          echo "MiTV Network: Starting Optimized Stream..."
          
          # OPTIMIZED FFMPEG: Speed barhane ke liye settings tabdeel ki hain
          ffmpeg $LOOP_CMD -re -i "$VIDEO_URL" \
          -vcodec libx264 -preset ultrafast -tune zerolatency -b:v 2000k \
          -maxrate 2500k -bufsize 5000k -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$FINAL_KEY"

      - name: Auto-Restart Trigger
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "6 Hours limit reaching. Re-triggering workflow for MiTV Network..."
          # GitHub API use karte hue workflow ko dobara start karna
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main", "inputs": {"video_url":"${{ github.event.inputs.video_url }}", "use_loop":"${{ github.event.inputs.use_loop }}"}}'
