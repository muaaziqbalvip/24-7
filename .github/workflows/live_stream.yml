name: 24/7 MiTV Network Streamer (Smart Recovery)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Dropbox Direct Link'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'

jobs:
  mitv_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install FFMPEG & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget fonts-liberation

      - name: Download Video
        id: download_step
        run: |
          echo "Downloading video from Dropbox..."
          if wget -O video.mp4 "${{ github.event.inputs.video_url }}"; then
            echo "DOWNLOAD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "DOWNLOAD_SUCCESS=false" >> $GITHUB_ENV
            echo "Download failed! Will show error screen."
          fi

      - name: Execute Live Stream
        env:
          SECRET_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Agar video sahi download hui to wo chalegi, warna Black Screen message ke sath
          if [ "$DOWNLOAD_SUCCESS" = "true" ]; then
            echo "Starting MiTV Stream from Local File..."
            ffmpeg -re -stream_loop -1 -i video.mp4 \
              -vcodec libx264 -preset ultrafast -tune zerolatency \
              -b:v 2500k -maxrate 3000k -bufsize 6000k \
              -threads 0 -pix_fmt yuv420p -g 60 -r 30 \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$SECRET_KEY"
          else
            echo "Showing MiTV Network Problem Screen..."
            # Ye command 720p ki black screen banayegi aur us par text likhegi
            ffmpeg -f lavfi -i color=c=black:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
              -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
              text='MiTV NETWORK\: CONNECTION PROBLEM...': fontcolor=white: fontsize=50: x=(w-text_w)/2: y=(h-text_h)/2" \
              -vcodec libx264 -preset ultrafast -tune zerolatency -b:v 1000k \
              -pix_fmt yuv420p -t 600 -f flv "rtmp://a.rtmp.youtube.com/live2/$SECRET_KEY"
          fi

      - name: Auto-Restart Trigger
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main", "inputs": {"video_url":"${{ github.event.inputs.video_url }}"}}'
