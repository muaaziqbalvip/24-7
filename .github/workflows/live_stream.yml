name: 24/7 Quran Stream MiTV

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-start
  workflow_dispatch:      # Manual start ke liye
  watch:                  # Star karne par start karne ke liye (optional)
    types: [started]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # 6 ghante (360 mins) se thoda pehle band hoga taake agli job shuru ho sake
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFMPEG
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Live Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          VIDEO_URL: "YOUR_MP4_DIRECT_LINK" # Yahan apna video link dalein
        run: |
          # Loop logic aur auto-restart handling
          ffmpeg -re -stream_loop -1 -i "$VIDEO_URL" \
          -vcodec libx264 -preset veryfast -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

      - name: Auto Restart Trigger
        if: always() # Agar stream crash bhi ho jaye tab bhi restart trigger karega
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
