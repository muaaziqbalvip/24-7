name: 24/7 MiTV (Download then Stream)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Dropbox Direct Link'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'
      stream_key:
        description: 'YouTube Stream Key'
        required: true

jobs:
  mitv_smart_stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v3

      - name: 2. Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget fonts-liberation

      - name: 3. Start Loading Screen & Download Video
        env:
          MY_KEY: ${{ github.event.inputs.stream_key }}
          DL_URL: ${{ github.event.inputs.video_url }}
        run: |
          # Pehle Loading Screen chalao YouTube par (Background mein)
          echo "Showing Loading Screen on YouTube..."
          ffmpeg -f lavfi -i color=c=black:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
            -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
            text='MiTV NETWORK\: VIDEO LOADING... PLEASE WAIT': fontcolor=white: fontsize=40: x=(w-text_w)/2: y=(h-text_h)/2" \
            -vcodec libx264 -preset ultrafast -tune zerolatency -b:v 1500k \
            -pix_fmt yuv420p -t 60 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY" &

          # Ab Video Download karo
          echo "Downloading video from Dropbox..."
          if wget -q --show-progress -O video.mp4 "$DL_URL"; then
             echo "Download Complete!"
             # Purani Loading stream ko kill karne ki zaroorat nahi, naya ffmpeg overwrite kar lega
          else
             echo "Download Failed! Showing Error Screen..."
             ffmpeg -f lavfi -i color=c=black:s=1280x720:r=30 -f lavfi -i anullsrc=r=44100:cl=stereo \
               -vf "drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
               text='MiTV NETWORK\: DOWNLOAD ERROR! RETRYING...': fontcolor=red: fontsize=40: x=(w-text_w)/2: y=(h-text_h)/2" \
               -vcodec libx264 -t 30 -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"
             exit 1
          fi

      - name: 4. Start Real Video Stream
        env:
          MY_KEY: ${{ github.event.inputs.stream_key }}
        run: |
          echo "Switching to Main Video Stream..."
          # Bitrate 3000k rakha hai taake YouTube Excellent connection de
          ffmpeg -re -stream_loop -1 -i video.mp4 \
            -vcodec libx264 -preset ultrafast -tune zerolatency \
            -b:v 3000k -maxrate 3500k -bufsize 7000k \
            -threads 0 -pix_fmt yuv420p -g 60 -r 30 \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"

      - name: 5. Auto Recovery
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\": {\"video_url\":\"${{ github.event.inputs.video_url }}\", \"stream_key\":\"${{ github.event.inputs.stream_key }}\"}}"
