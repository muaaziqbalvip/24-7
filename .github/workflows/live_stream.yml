      - name: 🎥 Step 6 - Process FFmpeg HLS and Git Push Loop (The Core Logic)
        env:
          SOURCE_URL: ${{ github.event.inputs.source_link }}
          LOGO_URL: ${{ github.event.inputs.logo_url }}
          CHANNEL_NAME: ${{ github.event.inputs.channel_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # URDU: Yeh script pehle logo layegi, usay bilkul chota karegi (scale=60:-1), aur phir HLS segments banayegi.
          # ENGLISH: This script will fetch the logo, make it very small (scale=60:-1), and then generate HLS segments.
          
          cd live_stream_output
          
          echo "Downloading logo from: $LOGO_URL"
          wget -q -O logo.png "$LOGO_URL" || touch logo.png
          
          echo "$CHANNEL_NAME" > ch_name.txt
          
          # URDU: HLS filter logic. 'scale=1280:720' video ko HD banata hai.
          # [1:v]scale=80:-1 logo ko 80 pixels chota kar deta hai (jaisa aapne manga tha "bilkul chota").
          # overlay=main_w-overlay_w-15:main_h-overlay_h-15 isko bottom right pe set karta hai.
          # ENGLISH: HLS filter logic. 'scale=1280:720' sets HD video. The logo is scaled to 80px wide.
          
          cat << 'EOF' > filter.txt
          [0:v]scale=1280:720,format=yuv420p[base];
          [1:v]scale=80:-1[logo];
          [base][logo]overlay=main_w-overlay_w-15:main_h-overlay_h-15[vid_logo];
          [vid_logo]drawtext=textfile='ch_name.txt':fontcolor=white:fontsize=16:x=15:y=main_h-text_h-15[final]
          EOF
          
          echo "Starting background FFmpeg HLS generation..."
          
          # Run FFmpeg in background
          # We use hls_time=4 to create 4-second chunks. hls_list_size=5 keeps only last 5 chunks in m3u8.
          ffmpeg -re -i "$SOURCE_URL" -i logo.png -filter_complex_script filter.txt \
            -map "[final]" -map 0:a? -c:v libx264 -preset ultrafast -b:v 1500k \
            -c:a aac -b:a 128k -f hls -hls_time 4 -hls_list_size 5 \
            -hls_flags delete_segments+append_list \
            stream.m3u8 > ffmpeg.log 2>&1 &
            
          FFMPEG_PID=$!
          
          echo "FFmpeg started with PID: $FFMPEG_PID"
          
          # URDU: Yeh loop har 15 seconds ke baad nayi .ts files ko gh-pages branch mein push karega.
          # ENGLISH: This loop pushes new .ts files to gh-pages branch every 15 seconds.
          
          # Time tracking for 5.5 hours limit (before GitHub kills it at 6 hrs)
          START_TIME=$(date +%s)
          MAX_RUNTIME=$((5 * 3600 + 30 * 60)) # 5 hours 30 minutes in seconds
          
          # Move to a separate temporary git directory to push to gh-pages
          cd ..
          mkdir git_push_repo
          cd git_push_repo
          git init
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git fetch origin gh-pages
          git checkout gh-pages
          
          LOOP_COUNT=0
          
          while kill -0 $FFMPEG_PID 2>/dev/null; do
             CURRENT_TIME=$(date +%s)
             ELAPSED=$((CURRENT_TIME - START_TIME))
             
             if [ $ELAPSED -ge $MAX_RUNTIME ]; then
                 echo "========================================================"
                 echo " URDU: 5.5 ghante poore ho gaye hain. Ab action restart hoga."
                 echo " ENGLISH: 5.5 hours elapsed. Auto-restart logic triggered."
                 echo "========================================================"
                 break
             fi
             
             # Copy latest files from FFmpeg output to our git folder
             cp -r ../live_stream_output/* .
             
             # Commit and push
             git add stream.m3u8 *.ts index.html || true
             git commit -m "Live Stream Update: Loop $LOOP_COUNT" || true
             
             # Force push quietly to avoid massive log spam
             git push -f origin gh-pages > /dev/null 2>&1
             
             LOOP_COUNT=$((LOOP_COUNT+1))
             echo "Pushed HLS segments to GitHub Pages. Loop: $LOOP_COUNT"
             
             # Sleep for 10 seconds before next push
             sleep 10
          done
          
          # Cleanup FFmpeg if it's still running
          kill -9 $FFMPEG_PID 2>/dev/null || true

      - name: 🔄 Step 7 - Auto-Restart Logic (24/7 Continuous Loop)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_URL: ${{ github.event.inputs.source_link }}
          LOGO_URL: ${{ github.event.inputs.logo_url }}
          CHANNEL_NAME: ${{ github.event.inputs.channel_name }}
        run: |
          echo "========================================================"
          echo " Triggering Next Workflow Run for 24/7 Coverage"
          echo " Organization: MUSLIM ISLAM"
          echo "========================================================"
          
          # URDU: Hum GitHub CLI (gh) ka istemaal karke is action ko wapis chala rahe hain.
          # ENGLISH: We are using GitHub CLI (gh) to trigger this action again.
          
          gh workflow run "mitv_hls_streamer.yml" \
            -f source_link="$SOURCE_URL" \
            -f channel_name="$CHANNEL_NAME" \
            -f logo_url="$LOGO_URL"
            
          echo "Next broadcast job triggered successfully!"
