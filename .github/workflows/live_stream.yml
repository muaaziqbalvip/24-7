name: MiTV Network 24/7 HLS Broadcaster (MUSLIM ISLAM)

# ==============================================================================
# URDU: Yeh hissa batata hai ke action kab aur kaise chalega.
# ENGLISH: This section defines when and how the workflow will be triggered.
# ==============================================================================
on:
  workflow_dispatch:
    inputs:
      source_link:
        description: 'Source Video Link (m3u, mp4, mkv, mpd, ts)'
        required: true
        type: string
      channel_name:
        description: 'Channel Name (e.g., MiTV Live)'
        required: true
        type: string
        default: 'MiTV Network - MUSLIM ISLAM'
      logo_url:
        description: 'Logo Image URL'
        required: false
        type: string
        default: 'https://via.placeholder.com/150x50.png?text=MiTV+Logo'

# ==============================================================================
# URDU: Github Actions ko dosre actions ko run karne ki ijazat.
# ENGLISH: Permissions for Github Actions to run other actions (for auto-restart).
# ==============================================================================
permissions:
  contents: write
  actions: write

jobs:
  live_hls_stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Step 1 - System Check for Muaaz Iqbal's MiTV
        run: |
          echo "========================================================"
          echo " Starting MiTV Network HLS Environment"
          echo " Organization: MUSLIM ISLAM"
          echo "========================================================"
          echo "Checking system specs..."
          lscpu
          free -h
          df -h

      - name: 🛠️ Step 2 - Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Step 3 - Install FFmpeg & Tools
        run: |
          echo "Installing tools..."
          sudo apt-get update -qq
          sudo apt-get install -yq ffmpeg gh tree curl wget coreutils jq
          ffmpeg -version

      - name: 📝 Step 4 - Setup GitHub Pages Branch (gh-pages)
        run: |
          # URDU: Hum ek alag branch banayenge jahan m3u8 aur web player save hoga.
          # ENGLISH: We will create a separate branch where m3u8 and web player will be saved.
          git config --global user.email "mitv@muslimislam.com"
          git config --global user.name "MiTV Network Bot"
          
          # Check if gh-pages branch exists, if not create it
          if git ls-remote --heads origin gh-pages | grep gh-pages; then
            echo "gh-pages branch exists."
          else
            echo "Creating gh-pages branch..."
            git checkout --orphan gh-pages
            git rm -rf .
            echo "# MiTV Live Stream Area" > README.md
            git add README.md
            git commit -m "Initial gh-pages commit"
            git push origin gh-pages
          fi
          
          # Go back to main for working
          git checkout main || git checkout master

      - name: 🌐 Step 5 - Generate Advanced Web Player (1000+ Lines Requirement)
        run: |
          # URDU: Yahan hum ek bohat lamba HTML/CSS/JS player bana rahe hain jo GitHub par show hoga.
          # ENGLISH: Here we are creating a very long HTML/CSS/JS player that will show on GitHub.
          mkdir -p live_stream_output
          cd live_stream_output
          
          cat << 'EOF' > index.html
