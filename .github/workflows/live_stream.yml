name: 24/7 MiTV Network (Bot & Protocol Fix)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Apni Video ka Link'
        required: true
        default: 'https://youtu.be/B0Rp1BmC-gQ'
      stream_key:
        description: 'YouTube Stream Key'
        required: true

jobs:
  mitv_fix_stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Repo
        uses: actions/checkout@v3

      - name: 2. Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget
          # yt-dlp ko update karna taake bot detection kam ho
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Download Video (To Avoid Bot Error)
        run: |
          echo "Downloading video to local server..."
          # Hum yahan user-agent change kar rahe hain taake YouTube block na kare
          yt-dlp -f "best[ext=mp4]" --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" -o video.mp4 "${{ github.event.inputs.youtube_url }}"

      - name: 4. Start Ultra Smooth Stream
        env:
          MY_KEY: ${{ github.event.inputs.stream_key }}
        run: |
          echo "MiTV Network: Starting Stream from Local File..."
          # Bitrate ko fix kiya hai 3000k par taake YouTube Excellent connection dikhaye
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset ultrafast -tune zerolatency \
          -b:v 3000k -maxrate 3500k -bufsize 7000k \
          -pix_fmt yuv420p -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"

      - name: 5. Auto Recovery
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\": {\"youtube_url\":\"${{ github.event.inputs.youtube_url }}\", \"stream_key\":\"${{ github.event.inputs.stream_key }}\"}}"
