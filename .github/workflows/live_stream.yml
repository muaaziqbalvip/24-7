name: MiTV Network 24/7 Broadcaster Pro

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Dropbox Direct MP4 Link (&raw=1 lazmi lagayein)'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'

