name: 24/7 MiTV Network Streamer Ultra-Pro

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-restart
  workflow_dispatch:      # Manual start aur input ke liye
    inputs:
      video_url:
        description: 'Dropbox Direct Link ya MP4 URL'
        required: true
        default: 'https://www.dropbox.com/scl/fi/40bs4vdqe4396dpxd9srq/lv_0_20260306070513.mp4?rlkey=7nu8rzif6ojyvxmqg5zim5vm8&st=msaab5va&raw=1'
      stream_key:
        description: 'YouTube Stream Key (Agar secret set nahi kiya)'
        required: false

jobs:
  mitv_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # 6 ghante se 10 min pehle band hoga taake restart ho sake
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup FFMPEG
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Execute Live Stream
        env:
          INPUT_KEY: ${{ github.event.inputs.stream_key }}
          SECRET_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          # Stream Key Finalize karna
          FINAL_KEY="${INPUT_KEY:-$SECRET_KEY}"
          
          echo "Starting MiTV Network Optimized Stream..."
          echo "Targeting 2500k Bitrate for YouTube Excellent Connection"

          # FFMPEG Settings optimized for GitHub Actions Speed
          # -vf scale=1280:720 (Video ko auto 720p kar dega taake internet par load kam ho)
          ffmpeg -re -stream_loop -1 -i "$VIDEO_URL" \
          -vf "scale=1280:720" \
          -vcodec libx264 -preset ultrafast -tune zerolatency \
          -b:v 2500k -maxrate 2500k -bufsize 5000k \
          -threads 0 -pix_fmt yuv420p -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$FINAL_KEY"

      - name: Auto-Restart Trigger
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering Auto-Restart for 24/7 Connectivity..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main", "inputs": {"video_url":"${{ github.event.inputs.video_url }}"}}'
