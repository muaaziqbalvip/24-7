name: 24/7 MiTV Network (My Video to Live)

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-restart
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Apni YouTube Video ka Link yahan dalein'
        required: true
        default: 'https://youtu.be/B0Rp1BmC-gQ' # Aapki Surah Rahman wali video

jobs:
  stream_my_video:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v3

      - name: 2. Install Tools (FFMPEG & YT-DLP)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Execute Live Stream
        env:
          MY_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          echo "Fetching Video Link and Starting Stream..."
          
          # yt-dlp direct link nikal kar FFMPEG ko dega
          # -stream_loop -1 isliye lagaya hai taake video khatam ho kar phir se shuru ho jaye
          
          ffmpeg -re -stream_loop -1 -i $(yt-dlp -f "best[ext=mp4]" -g "${{ github.event.inputs.youtube_url }}") \
          -c:v libx264 -preset ultrafast -tune zerolatency \
          -b:v 2500k -maxrate 3000k -bufsize 6000k \
          -threads 0 -pix_fmt yuv420p -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$MY_KEY"

      - name: 4. Auto-Restart Logic
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
          -d '{"ref":"main", "inputs": {"youtube_url":"${{ github.event.inputs.youtube_url }}"}}'
