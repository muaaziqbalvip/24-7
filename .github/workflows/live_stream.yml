                  // URDU: Yeh Javascript link ko copy karne aur URL set karne ke liye hai.
                  // ENGLISH: This Javascript is for copying the link and setting the URL.
                  
                  document.addEventListener('DOMContentLoaded', function() {
                      const currentUrl = window.location.href.replace('index.html', '');
                      const m3u8Link = currentUrl + 'stream.m3u8';
                      document.getElementById('m3u8-url').innerText = m3u8Link;
                      
                      // Auto play attempt
                      var player = videojs('mitv-player');
                      player.ready(function() {
                          var promise = player.play();
                          if (promise !== undefined) {
                              promise.catch(function(error) {
                                  console.log("Auto-play was prevented by the browser.");
                              });
                          }
                      });
                  });
                  
                  function copyLink() {
                      const textToCopy = document.getElementById('m3u8-url').innerText;
                      navigator.clipboard.writeText(textToCopy).then(function() {
                          alert('MiTV m3u8 Link Copied Successfully!');
                      }, function(err) {
                          console.error('Could not copy text: ', err);
                      });
                  }

