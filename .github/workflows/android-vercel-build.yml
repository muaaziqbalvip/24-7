name: MI AI Kotlin WebView App (Error-Free)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ANDROID_SDK_VERSION: '34'
  BUILD_TOOLS_VERSION: '34.0.0'
  GRADLE_VERSION: '8.0'
  WEB_URL: 'https://miai-chi.vercel.app/'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 34
          build-tools-version: '34.0.0'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'

      - name: 🎨 Download Icon
        run: |
          mkdir -p app-icon
          curl -L -o app-icon/icon.png "https://i.ibb.co/1t0KstMG/file-0000000090007208b1864eebb1423b3e.png"

      - name: 📱 Create Project
        run: |
          mkdir -p android-app/app/src/main/kotlin/com/muaaz/miai
          mkdir -p android-app/app/src/main/res/{layout,values,mipmap-xxxhdpi,mipmap-xxhdpi,mipmap-xhdpi,mipmap-hdpi,mipmap-mdpi}

      - name: 📋 Create Gradle Files
        run: |
          cat > android-app/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MI AI"
          include(":app")
          EOF

          cat > android-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m
          org.gradle.parallel=true
          android.suppressUnsupportedCompileSdk=34
          EOF

          cat > android-app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
              id("com.google.gms.google-services") version "4.4.0" apply false
          }
          EOF

          cat > android-app/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("com.google.gms.google-services")
          }

          android {
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.muaaz.miai"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }
              signingConfigs {
                  create("release") {
                      storeFile = file("$rootDir/release.jks")
                      storePassword = "miai@2024"
                      keyAlias = "miai_key"
                      keyPassword = "miai@2024"
                  }
              }
              buildTypes {
                  debug {
                      isDebuggable = true
                      isMinifyEnabled = false
                  }
                  release {
                      isDebuggable = false
                      isMinifyEnabled = true
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              buildFeatures {
                  viewBinding = true
              }
              lint {
                  abortOnError = false
              }
              namespace = "com.muaaz.miai"
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.10.0")
              implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")
              
              // Firebase
              implementation("com.google.firebase:firebase-database-ktx:20.3.0")
              implementation("com.google.firebase:firebase-auth-ktx:22.3.1")
              implementation("com.google.firebase:firebase-bom:33.0.0")
          }
          EOF

          cat > android-app/app/proguard-rules.pro << 'EOF'
          -keep class com.muaaz.miai.** { *; }
          -dontwarn kotlin.**
          EOF

      - name: 📝 Create Manifest
        run: |
          cat > android-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />

              <application
                  android:allowBackup="true"
                  android:debuggable="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.MIAI"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.MIAI.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>

          </manifest>
          EOF

      - name: 🎨 Create Resources
        run: |
          cat > android-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary">#4a90e2</color>
              <color name="primary_dark">#1a1a2e</color>
              <color name="background">#121212</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          cat > android-app/app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">MI AI</string>
          </resources>
          EOF

          cat > android-app/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.MIAI" parent="Theme.MaterialComponents.DayNight">
                  <item name="colorPrimary">@color/primary</item>
                  <item name="colorPrimaryVariant">@color/primary_dark</item>
                  <item name="colorBackground">@color/background</item>
              </style>
              <style name="Theme.MIAI.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          EOF

