          fi

          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ APK ready"

      - name: 📦 Copy APK
        run: |
          cp "android-app/${{ steps.build.outputs.apk_path }}" ./MI-AI.apk
          ls -lah MI-AI.apk

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: MI-AI-APK
          path: MI-AI.apk
          retention-days: 30

      - name: 🎉 Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: 🚀 MI AI WebView Browser
          body: |
            # MI AI - WebView Browser v1.0.0

            ## ✨ Features
            ✅ All Permissions (Camera, Mic, Storage, Location)
            ✅ Offline Caching Support
            ✅ Loading Spinner
            ✅ Swipe to Refresh
            ✅ Smart Back Button
            ✅ Dark Theme

            ## 📱 What it does
            - Runs https://miai-chi.vercel.app/
            - Full file upload/download
            - Camera & microphone access
            - Audio/music playback
            - Responsive design

            ## 📥 Installation
            1. Download MI-AI.apk
            2. Enable Unknown Sources
            3. Install & Grant Permissions
            4. Done!

            Built with ❤️ by Muaaz
          files: MI-AI.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Done
        if: success()
        run: |
          echo "✅ SUCCESS!"
          echo "✓ All permissions included"
          echo "✓ Loading spinner ready"
          echo "✓ APK ready for distribution"
