name: MI AI Kotlin WebView App (Complete)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

env:
  ANDROID_SDK_VERSION: '34'
  BUILD_TOOLS_VERSION: '34.0.0'
  GRADLE_VERSION: '8.0'
  WEB_URL: 'https://miai-chi.vercel.app/'

jobs:
  build-webview-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 34
          build-tools-version: '34.0.0'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: 🎨 Download App Icon
        run: |
          mkdir -p app-icon
          curl -L -o app-icon/icon.png "https://i.ibb.co/1t0KstMG/file-0000000090007208b1864eebb1423b3e.png"
          echo "✅ Icon downloaded"

      - name: 📱 Create Project Structure
        run: |
          mkdir -p android-app/app/src/main/kotlin/com/muaaz/miai
          mkdir -p android-app/app/src/main/res/{layout,drawable,values,mipmap-xxxhdpi,mipmap-xxhdpi,mipmap-xhdpi,mipmap-hdpi,mipmap-mdpi}
          echo "✅ Structure created"

      - name: 📋 Create Gradle Files
        run: |
          cat > android-app/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MI AI"
          include(":app")
          EOF

          cat > android-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m
          org.gradle.parallel=true
          EOF

          cat > android-app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
              id("com.google.gms.google-services") version "4.4.0" apply false
          }
          EOF

          cat > android-app/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("com.google.gms.google-services")
          }

          android {
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.muaaz.miai"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }
              signingConfigs {
                  create("release") {
                      storeFile = file("$rootDir/release.jks")
                      storePassword = "miai@2024"
                      keyAlias = "miai_key"
                      keyPassword = "miai@2024"
                  }
              }
              buildTypes {
                  debug {
                      isDebuggable = true
                      isMinifyEnabled = false
                  }
                  release {
                      isDebuggable = false
                      isMinifyEnabled = true
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              buildFeatures {
                  viewBinding = true
              }
              lint {
                  abortOnError = false
              }
              namespace = "com.muaaz.miai"
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.10.0")
              implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")
              
              // Firebase
              implementation("com.google.firebase:firebase-database-ktx:20.3.0")
              implementation("com.google.firebase:firebase-auth-ktx:22.3.1")
              
              testImplementation("junit:junit:4.13.2")
          }
          EOF

          cat > android-app/app/proguard-rules.pro << 'EOF'
          -keep class com.muaaz.miai.** { *; }
          -dontwarn kotlin.**
          EOF

          echo "✅ Gradle files created"

      - name: 📝 Create AndroidManifest
        run: |
          cat > android-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <!-- Network & Internet -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <!-- Storage -->
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />

              <!-- Media -->
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />

              <!-- Location -->
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <!-- Android 13+ -->
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />

              <application
                  android:allowBackup="true"
                  android:debuggable="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.MIAI"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.MIAI.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>

          </manifest>
          EOF

          echo "✅ Manifest created"

      - name: 🎨 Create Resources
        run: |
          cat > android-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary">#4a90e2</color>
              <color name="primary_dark">#1a1a2e</color>
              <color name="accent">#FF5722</color>
              <color name="background">#121212</color>
              <color name="surface">#1e1e1e</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          cat > android-app/app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">MI AI</string>
              <string name="loading">Loading...</string>
          </resources>
          EOF

          cat > android-app/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.MIAI" parent="Theme.MaterialComponents.DayNight">
                  <item name="colorPrimary">@color/primary</item>
                  <item name="colorPrimaryVariant">@color/primary_dark</item>
                  <item name="colorSecondary">@color/accent</item>
                  <item name="colorBackground">@color/background</item>
              </style>
              <style name="Theme.MIAI.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          EOF

          echo "✅ Resources created"

      - name: 🎯 Create MainActivity
        run: |
          cat > android-app/app/src/main/kotlin/com/muaaz/miai/MainActivity.kt << 'EOF'
          package com.muaaz.miai

          import android.Manifest
          import android.app.ProgressDialog
          import android.content.pm.PackageManager
          import android.os.Build
          import android.os.Bundle
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import android.webkit.WebChromeClient
          import android.webkit.PermissionRequest
          import android.view.KeyEvent
          import android.view.View
          import android.widget.FrameLayout
          import android.widget.ProgressBar
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          import androidx.swiperefreshlayout.widget.SwipeRefreshLayout
          import com.google.firebase.database.FirebaseDatabase
          import java.util.UUID

          class MainActivity : AppCompatActivity() {

              private lateinit var webView: WebView
              private lateinit var swipeRefresh: SwipeRefreshLayout
              private lateinit var loadingSpinner: ProgressBar
              private lateinit var progressDialog: ProgressDialog
              private val webUrl = "https://miai-chi.vercel.app/"
              private val PERMISSION_REQUEST_CODE = 100
              private var deviceId = ""

              private val permissions = arrayOf(
                  Manifest.permission.INTERNET,
                  Manifest.permission.CAMERA,
                  Manifest.permission.RECORD_AUDIO,
                  Manifest.permission.READ_EXTERNAL_STORAGE,
                  Manifest.permission.WRITE_EXTERNAL_STORAGE,
                  Manifest.permission.MODIFY_AUDIO_SETTINGS,
                  Manifest.permission.ACCESS_FINE_LOCATION,
                  Manifest.permission.ACCESS_COARSE_LOCATION,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      Manifest.permission.READ_MEDIA_AUDIO
                  else
                      Manifest.permission.CAMERA,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      Manifest.permission.READ_MEDIA_VIDEO
                  else
                      Manifest.permission.CAMERA,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      Manifest.permission.READ_MEDIA_IMAGES
                  else
                      Manifest.permission.CAMERA
              ).distinctBy { it }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  // Get device ID
                  deviceId = UUID.randomUUID().toString()

                  // Init UI
                  initViews()

                  // Request all permissions
                  requestAllPermissions()

                  // Setup WebView
                  setupWebView()

                  // Register to Firebase
                  registerDevice()

                  // Load web app
                  webView.loadUrl(webUrl)
              }

              private fun initViews() {
                  webView = findViewById(R.id.webview)
                  swipeRefresh = findViewById(R.id.swipe_refresh)
                  loadingSpinner = findViewById(R.id.loading_spinner)

                  progressDialog = ProgressDialog(this).apply {
                      setTitle("MI AI")
                      setMessage("Loading...")
                      setCancelable(false)
                      setProgressStyle(ProgressDialog.STYLE_SPINNER)
                  }

                  swipeRefresh.setOnRefreshListener {
                      webView.reload()
                      swipeRefresh.isRefreshing = false
                  }
              }

              private fun requestAllPermissions() {
                  val needed = permissions.filter {
                      ContextCompat.checkSelfPermission(this, it) != PackageManager.PERMISSION_GRANTED
                  }.toTypedArray()

                  if (needed.isNotEmpty()) {
                      ActivityCompat.requestPermissions(this, needed, PERMISSION_REQUEST_CODE)
                  }
              }

              override fun onRequestPermissionsResult(
                  requestCode: Int,
                  permissions: Array<String>,
                  grantResults: IntArray
              ) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      val allGranted = grantResults.all { it == PackageManager.PERMISSION_GRANTED }
                      if (!allGranted) {
                          requestAllPermissions()
                      }
                  }
              }

              private fun setupWebView() {
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      databaseEnabled = true
                      mediaPlaybackRequiresUserGesture = false
                      allowFileAccess = true
                      mixedContentMode = android.webkit.WebSettings.MIXED_CONTENT_ALWAYS_ALLOW
                      useWideViewPort = true
                      loadWithOverviewMode = true
                      builtInZoomControls = true
                      displayZoomControls = false
                  }

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageStarted(view: WebView?, url: String?, favicon: android.graphics.Bitmap?) {
                          super.onPageStarted(view, url, favicon)
                          loadingSpinner.visibility = View.VISIBLE
                          progressDialog.show()
                          updateFirebase()
                      }

                      override fun onPageFinished(view: WebView?, url: String?) {
                          super.onPageFinished(view, url)
                          loadingSpinner.visibility = View.GONE
                          if (progressDialog.isShowing) progressDialog.dismiss()
                      }

                      override fun shouldOverrideUrlLoading(view: WebView?, url: String?): Boolean {
                          if (url != null && url.startsWith("http")) {
                              view?.loadUrl(url)
                              return true
                          }
                          return false
                      }
                  }

                  webView.webChromeClient = object : WebChromeClient() {
                      override fun onPermissionRequest(request: PermissionRequest?) {
                          if (request != null) {
                              request.grant(request.resources)
                          }
                      }
                  }
              }

              private fun registerDevice() {
                  val db = FirebaseDatabase.getInstance("https://ramadan-2385b-default-rtdb.firebaseio.com").reference
                  
                  val deviceInfo = mapOf(
                      "name" to "${Build.MANUFACTURER} ${Build.MODEL}",
                      "version" to "1.0.0",
                      "osVersion" to Build.VERSION.RELEASE,
                      "firstSeen" to System.currentTimeMillis(),
                      "lastSeen" to System.currentTimeMillis(),
                      "status" to "active"
                  )
                  
                  db.child("app-devices").child(deviceId).setValue(deviceInfo)
              }

              private fun updateFirebase() {
                  try {
                      val db = FirebaseDatabase.getInstance("https://ramadan-2385b-default-rtdb.firebaseio.com").reference
                      db.child("app-devices").child(deviceId).child("lastSeen").setValue(System.currentTimeMillis())
                  } catch (e: Exception) {
                      // Silent fail
                  }
              }

              override fun onResume() {
                  super.onResume()
                  updateFirebase()
              }

              override fun onKeyDown(keyCode: Int, event: KeyEvent?): Boolean {
                  if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                      webView.goBack()
                      return true
                  }
                  return super.onKeyDown(keyCode, event)
              }
          }
          EOF

          echo "✅ MainActivity created"

      - name: 📐 Create Layout
        run: |
          cat > android-app/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.swiperefreshlayout.widget.SwipeRefreshLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/swipe_refresh"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <FrameLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:background="@color/background">

                  <WebView
                      android:id="@+id/webview"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent" />

                  <ProgressBar
                      android:id="@+id/loading_spinner"
                      android:layout_width="80dp"
                      android:layout_height="80dp"
                      android:layout_gravity="center"
                      android:visibility="gone"
                      android:indeterminate="true" />

              </FrameLayout>

          </androidx.swiperefreshlayout.widget.SwipeRefreshLayout>
          EOF

          echo "✅ Layout created"

      - name: 🎨 Create Icons
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick

          # Create directories first
          mkdir -p android-app/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xhdpi
          mkdir -p android-app/app/src/main/res/mipmap-hdpi
          mkdir -p android-app/app/src/main/res/mipmap-mdpi

          # Create icons
          convert app-icon/icon.png -resize 192x192 android-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 192x192 android-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 144x144 android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 144x144 android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 96x96 android-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 96x96 android-app/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 72x72 android-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert app-icon/icon.png -resize 72x72 android-app/app/src/main/res/mipmap-hdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 48x48 android-app/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert app-icon/icon.png -resize 48x48 android-app/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

          echo "✅ Icons created successfully"
          ls -la android-app/app/src/main/res/mipmap-*/

      - name: 🔐 Create Keystore
        run: |
          keytool -genkey -v -keystore android-app/release.jks -keyalg RSA -keysize 2048 \
            -validity 10000 -alias miai_key -storepass miai@2024 -keypass miai@2024 \
            -dname "CN=Muaaz,O=Muslim Islam,L=Kasur,C=PK" 2>&1 | grep -i "saved\|created" || true
          echo "✅ Keystore ready"

      - name: 🛠️ Build APK
        id: build
        run: |
          cd android-app
          gradle assembleDebug --stacktrace
          
          APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
              echo "❌ Build failed"
              exit 1
          fi
          
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ APK ready: $APK"

      - name: 📦 Copy APK
        run: |
          cp "android-app/${{ steps.build.outputs.apk_path }}" ./MI-AI.apk
          ls -lah MI-AI.apk

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: MI-AI-APK
          path: MI-AI.apk
          retention-days: 30

      - name: 🎉 Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: 🚀 MI AI WebView Browser
          body: |
            # MI AI - WebView Browser
            
            ## ✨ Features
            ✅ All Permissions (Camera, Mic, Storage, Location, etc)
            ✅ Firebase Device Tracking
            ✅ Offline Caching
            ✅ Loading Spinner
            ✅ Swipe to Refresh
            ✅ Smart Back Button
            ✅ Dark Theme
            
            ## 📥 Installation
            1. Download `MI-AI.apk`
            2. Settings → Security → Unknown Sources ON
            3. Install APK
            4. Grant permissions
            5. Done!
            
            ## 🎯 Features
            - Runs https://miai-chi.vercel.app/
            - Full file upload/download
            - Camera & microphone access
            - Audio/music playback
            - Device tracking via Firebase
            - Version tracking
            
            Built with ❤️ by Muaaz
          files: MI-AI.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Success
        run: |
          echo "✅ MI AI App Built Successfully!"
          echo "✓ All permissions included"
          echo "✓ Firebase tracking enabled"
          echo "✓ Loading spinner ready"
          echo "✓ APK ready for distribution"
