      - name: 🎯 Create MainActivity (Realtime Notifications + Custom Refresh + Calling)
        run: |
          cat > android-app/app/src/main/kotlin/com/muaaz/miai/MainActivity.kt << 'EOF'
          package com.muaaz.miai

          import android.Manifest
          import android.animation.ObjectAnimator
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.content.Context
          import android.content.pm.PackageManager
          import android.graphics.Color
          import android.os.Build
          import android.os.Bundle
          import android.os.Handler
          import android.os.Looper
          import android.util.Log
          import android.view.View
          import android.view.animation.OvershootInterpolator
          import android.webkit.JavascriptInterface
          import android.webkit.PermissionRequest
          import android.webkit.WebChromeClient
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import android.widget.FrameLayout
          import android.widget.LinearLayout
          import android.widget.ProgressBar
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.app.NotificationCompat
          import androidx.core.content.ContextCompat
          import com.google.firebase.database.DataSnapshot
          import com.google.firebase.database.DatabaseError
          import com.google.firebase.database.FirebaseDatabase
          import com.google.firebase.database.ValueEventListener

          class MainActivity : AppCompatActivity() {

              private lateinit var webView: WebView
              private lateinit var spinner: ProgressBar
              private lateinit var rootLayout: FrameLayout
              private lateinit var pullIndicator: TextView
              private lateinit var notifBanner: LinearLayout
              private lateinit var notifTitleView: TextView
              private lateinit var notifMessageView: TextView

              private var lastNotificationTimestamp: String? = null
              private val firebaseUrl = "https://ramadan-2385b-default-rtdb.firebaseio.com"
              private val channelId = "mi_ai_notifications"

              // Custom pull-to-refresh state (system swipe refresh removed)
              private var pullStartY = 0f
              private var isPulling = false
              private val pullThreshold = 160f

              private val permissions = arrayOf(
                  Manifest.permission.INTERNET,
                  Manifest.permission.CAMERA,
                  Manifest.permission.RECORD_AUDIO,
                  Manifest.permission.MODIFY_AUDIO_SETTINGS,
                  Manifest.permission.READ_EXTERNAL_STORAGE,
                  Manifest.permission.WRITE_EXTERNAL_STORAGE,
                  Manifest.permission.ACCESS_FINE_LOCATION,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      Manifest.permission.POST_NOTIFICATIONS else Manifest.permission.CAMERA,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      Manifest.permission.READ_MEDIA_AUDIO else Manifest.permission.CAMERA,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      Manifest.permission.READ_MEDIA_VIDEO else Manifest.permission.CAMERA,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                      Manifest.permission.READ_MEDIA_IMAGES else Manifest.permission.CAMERA,
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S)
                      Manifest.permission.BLUETOOTH_CONNECT else Manifest.permission.CAMERA
              ).distinctBy { it }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  webView = findViewById(R.id.webview)
                  spinner = findViewById(R.id.spinner)
                  rootLayout = findViewById(R.id.root_layout)
                  pullIndicator = findViewById(R.id.pull_indicator)
                  notifBanner = findViewById(R.id.notif_banner)
                  notifTitleView = findViewById(R.id.notif_title)
                  notifMessageView = findViewById(R.id.notif_message)

                  createNotificationChannel()
                  requestPermissions()
                  setupWebView()
                  setupCustomPullToRefresh()
                  setupNotifBannerDismiss()

                  webView.loadUrl("https://muaaziqbalvip.github.io/MIAIWORLD/")

                  listenForRealtimeNotifications()
              }

              private fun requestPermissions() {
                  val needed = permissions.filter {
                      ContextCompat.checkSelfPermission(this, it) != PackageManager.PERMISSION_GRANTED
                  }.toTypedArray()
                  if (needed.isNotEmpty()) {
                      ActivityCompat.requestPermissions(this, needed, 100)
                  }
              }

              private fun setupWebView() {
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      databaseEnabled = true
                      mediaPlaybackRequiresUserGesture = false
                      allowFileAccess = true
                      mixedContentMode = android.webkit.WebSettings.MIXED_CONTENT_ALWAYS_ALLOW
                      useWideViewPort = true
                      loadWithOverviewMode = true
                  }

                  // Expose native bridge for calling features (mic/camera already granted natively)
                  webView.addJavascriptInterface(NativeBridge(), "MiAiNative")

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageStarted(view: WebView?, url: String?, favicon: android.graphics.Bitmap?) {
                          super.onPageStarted(view, url, favicon)
                          spinner.visibility = View.VISIBLE
                      }

                      override fun onPageFinished(view: WebView?, url: String?) {
                          super.onPageFinished(view, url)
                          spinner.visibility = View.GONE
                          hidePullIndicator()
                      }

                      override fun shouldOverrideUrlLoading(view: WebView?, url: String?): Boolean {
                          if (url != null && url.startsWith("http")) {
                              view?.loadUrl(url)
                              return true
                          }
                          return false
                      }
                  }

                  // WebChromeClient grants mic/camera permission requests from the
                  // WebRTC-based AI voice calling feature running inside the web app.
                  webView.webChromeClient = object : WebChromeClient() {
                      override fun onPermissionRequest(request: PermissionRequest?) {
                          runOnUiThread {
                              request?.grant(request.resources)
                          }
                      }
                  }
              }

              // Native bridge exposed to JS as window.MiAiNative — lets the web app's
              // WebRTC calling UI confirm native permission state before starting a call.
              inner class NativeBridge {
                  @JavascriptInterface
                  fun hasMicPermission(): Boolean {
                      return ContextCompat.checkSelfPermission(this@MainActivity, Manifest.permission.RECORD_AUDIO) == PackageManager.PERMISSION_GRANTED
                  }

                  @JavascriptInterface
                  fun hasCameraPermission(): Boolean {
                      return ContextCompat.checkSelfPermission(this@MainActivity, Manifest.permission.CAMERA) == PackageManager.PERMISSION_GRANTED
                  }

                  @JavascriptInterface
                  fun requestCallPermissions() {
                      runOnUiThread { requestPermissions() }
                  }
              }

              // ---------- Custom pull-to-refresh (replaces SwipeRefreshLayout) ----------
              private fun setupCustomPullToRefresh() {
                  webView.setOnTouchListener { _, event ->
                      when (event.action) {
                          android.view.MotionEvent.ACTION_DOWN -> {
                              if (webView.scrollY == 0) {
                                  pullStartY = event.rawY
                                  isPulling = true
                              }
                              false
                          }
                          android.view.MotionEvent.ACTION_MOVE -> {
                              if (isPulling && webView.scrollY == 0) {
                                  val delta = event.rawY - pullStartY
                                  if (delta > 0) {
                                      showPullIndicator(delta)
                                  }
                              }
                              false
                          }
                          android.view.MotionEvent.ACTION_UP, android.view.MotionEvent.ACTION_CANCEL -> {
                              if (isPulling) {
                                  val delta = event.rawY - pullStartY
                                  if (delta > pullThreshold) {
                                      triggerCustomRefresh()
                                  } else {
                                      hidePullIndicator()
                                  }
                              }
                              isPulling = false
                              false
                          }
                          else -> false
                      }
                  }
              }

              private fun showPullIndicator(delta: Float) {
                  pullIndicator.visibility = View.VISIBLE
                  val progress = (delta / pullThreshold).coerceIn(0f, 1f)
                  pullIndicator.alpha = progress
                  pullIndicator.rotation = progress * 360f
                  pullIndicator.translationY = (delta / 3).coerceAtMost(80f)
              }

              private fun hidePullIndicator() {
                  pullIndicator.animate()
                      .alpha(0f)
                      .translationY(0f)
                      .setDuration(200)
                      .withEndAction { pullIndicator.visibility = View.GONE }
                      .start()
              }

              private fun triggerCustomRefresh() {
                  pullIndicator.visibility = View.VISIBLE
                  val spin = ObjectAnimator.ofFloat(pullIndicator, "rotation", 0f, 360f)
                  spin.duration = 600
                  spin.repeatCount = ObjectAnimator.INFINITE
                  spin.interpolator = OvershootInterpolator()
                  spin.start()

                  webView.reload()

                  Handler(Looper.getMainLooper()).postDelayed({
                      spin.cancel()
                      hidePullIndicator()
                  }, 900)
              }

              // ---------- Realtime Firebase notifications (system + in-app banner) ----------
              private fun listenForRealtimeNotifications() {
                  val db = FirebaseDatabase.getInstance(firebaseUrl)
                  val notifRef = db.getReference("notifications").limitToLast(1)

                  notifRef.addValueEventListener(object : ValueEventListener {
                      override fun onDataChange(snapshot: DataSnapshot) {
                          for (child in snapshot.children) {
                              val title = child.child("title").getValue(String::class.java) ?: continue
                              val message = child.child("message").getValue(String::class.java) ?: ""
                              val timestamp = child.child("timestamp").getValue(String::class.java) ?: ""
                              val priority = child.child("priority").getValue(String::class.java) ?: "normal"

                              if (timestamp != lastNotificationTimestamp) {
                                  lastNotificationTimestamp = timestamp
                                  showSystemNotification(title, message, priority)
                                  showInAppBanner(title, message, priority)
                              }
                          }
                      }

                      override fun onCancelled(error: DatabaseError) {
                          Log.e("MiAi", "Notification listener cancelled: ${error.message}")
                      }
                  })
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(
                          channelId,
                          "MI AI Updates",
                          NotificationManager.IMPORTANCE_HIGH
                      ).apply {
                          description = "Realtime updates and announcements from MI AI"
                          enableVibration(true)
                      }
                      val manager = getSystemService(NotificationManager::class.java)
                      manager.createNotificationChannel(channel)
                  }
              }

              private fun showSystemNotification(title: String, message: String, priority: String) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      return
                  }

                  val importance = if (priority == "high") NotificationCompat.PRIORITY_MAX else NotificationCompat.PRIORITY_DEFAULT

                  val notification = NotificationCompat.Builder(this, channelId)
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentTitle(title)
                      .setContentText(message)
                      .setStyle(NotificationCompat.BigTextStyle().bigText(message))
                      .setPriority(importance)
                      .setAutoCancel(true)
                      .build()

                  val manager = ContextCompat.getSystemService(this, NotificationManager::class.java)
                  manager?.notify(System.currentTimeMillis().toInt(), notification)
              }

              private fun showInAppBanner(title: String, message: String, priority: String) {
                  runOnUiThread {
                      notifTitleView.text = title
                      notifMessageView.text = message
                      notifBanner.setBackgroundResource(
                          if (priority == "high") R.drawable.banner_urgent_gradient else R.drawable.banner_gradient
                      )

                      notifBanner.visibility = View.VISIBLE
                      notifBanner.translationY = -300f
                      notifBanner.alpha = 0f
                      notifBanner.animate()
                          .translationY(0f)
                          .alpha(1f)
                          .setDuration(400)
                          .setInterpolator(OvershootInterpolator(1.2f))
                          .start()

                      Handler(Looper.getMainLooper()).postDelayed({
                          dismissBanner()
                      }, 6000)
                  }
              }

              private fun setupNotifBannerDismiss() {
                  notifBanner.setOnClickListener {
                      dismissBanner()
                  }
              }

              private fun dismissBanner() {
                  notifBanner.animate()
                      .translationY(-300f)
                      .alpha(0f)
                      .setDuration(300)
                      .withEndAction { notifBanner.visibility = View.GONE }
                      .start()
              }

              override fun onResume() {
                  super.onResume()
                  updateFirebaseStatus()
              }

              private fun updateFirebaseStatus() {
                  try {
                      val db = FirebaseDatabase.getInstance(firebaseUrl).reference
                      val deviceInfo = mapOf(
                          "lastSeen" to System.currentTimeMillis(),
                          "version" to "2.0.0",
                          "osVersion" to Build.VERSION.RELEASE
                      )
                      db.child("app-devices").child(Build.SERIAL).updateChildren(deviceInfo)
                  } catch (e: Exception) {
                      Log.e("MiAi", "Failed to update device status: ${e.message}")
                  }
              }

              override fun onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack()
                  } else {
                      super.onBackPressed()
                  }
              }
          }
          EOF

      - name: 📐 Create Layout (No SwipeRefreshLayout — custom pull + notification banner)
        run: |
          cat > android-app/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/root_layout"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/background">

              <WebView
                  android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />

              <TextView
                  android:id="@+id/pull_indicator"
                  android:layout_width="40dp"
                  android:layout_height="40dp"
                  android:layout_gravity="top|center_horizontal"
                  android:layout_marginTop="24dp"
                  android:text="🔄"
                  android:textSize="24sp"
                  android:gravity="center"
                  android:visibility="gone" />

              <ProgressBar
                  android:id="@+id/spinner"
                  android:layout_width="80dp"
                  android:layout_height="80dp"
                  android:layout_gravity="center"
                  android:visibility="gone" />

              <LinearLayout
                  android:id="@+id/notif_banner"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_gravity="top"
                  android:layout_margin="12dp"
                  android:orientation="vertical"
                  android:padding="16dp"
                  android:background="@drawable/banner_gradient"
                  android:elevation="12dp"
                  android:visibility="gone">

                  <TextView
                      android:id="@+id/notif_title"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:textColor="@color/white"
                      android:textSize="16sp"
                      android:textStyle="bold" />

                  <TextView
                      android:id="@+id/notif_message"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="4dp"
                      android:textColor="@color/white"
                      android:textSize="13sp"
                      android:alpha="0.9" />

              </LinearLayout>

          </FrameLayout>
          EOF

      - name: 🎨 Create Icons
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick

          mkdir -p android-app/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xhdpi
          mkdir -p android-app/app/src/main/res/mipmap-hdpi
          mkdir -p android-app/app/src/main/res/mipmap-mdpi

          convert app-icon/icon.png -resize 192x192 android-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 192x192 android-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 144x144 android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 144x144 android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 96x96 android-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 96x96 android-app/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 72x72 android-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert app-icon/icon.png -resize 72x72 android-app/app/src/main/res/mipmap-hdpi/ic_launcher_round.png

          convert app-icon/icon.png -resize 48x48 android-app/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert app-icon/icon.png -resize 48x48 android-app/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

          echo "✅ Icons created"

      - name: 🔐 Create Keystore
        run: |
          keytool -genkey -v -keystore android-app/release.jks -keyalg RSA -keysize 2048 \
            -validity 10000 -alias miai_key -storepass miai@2024 -keypass miai@2024 \
            -dname "CN=Muaaz,O=Muslim Islam,L=Kasur,C=PK" 2>&1 | tail -5

      - name: 🛠️ Build APK
        id: build
        run: |
          cd android-app
          gradle assembleDebug --stacktrace

          APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
              echo "❌ Build failed"
              exit 1
          fi

          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ APK ready"

      - name: 📦 Copy APK
        run: |
          cp "android-app/${{ steps.build.outputs.apk_path }}" ./MI-AI.apk
          ls -lah MI-AI.apk

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: MI-AI-APK
          path: MI-AI.apk
          retention-days: 30

      - name: 🎉 Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.0
          name: 🚀 MI AI WebView Browser v2.0.0
          body: |
            # MI AI - WebView Browser v2.0.0

            ## ✨ New in v2
            ✅ Realtime Firebase notifications (system + in-app banner)
            ✅ Custom pull-to-refresh animation (no system swipe bar)
            ✅ Calling permissions ready (camera, mic, bluetooth) for AI voice calls
            ✅ Native JS bridge (window.MiAiNative) for WebRTC permission checks
            ✅ Auto-notify on every new version release

            ## 📱 What it does
            - Runs https://muaaziqbalvip.github.io/MIAIWORLD/
            - Full file upload/download
            - Camera & microphone access for calling features
            - Realtime push notifications from Admin Panel
            - Responsive design, dark theme

            ## 📥 Installation
            1. Download MI-AI.apk
            2. Enable Unknown Sources
            3. Install & Grant Permissions
            4. Done!

            Built with ❤️ by Muaaz
          files: MI-AI.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Done
        if: success()
        run: |
          echo "✅ SUCCESS!"
          echo "✓ Realtime notifications wired (system + in-app banner)"
          echo "✓ Custom pull-to-refresh animation active"
          echo "✓ Calling permissions + JS bridge ready"
          echo "✓ APK ready for distribution"
