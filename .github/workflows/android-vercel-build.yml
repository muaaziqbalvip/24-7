            â™ª *ilm aur fikr ka silsila*
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            MI-AI.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: âœ… Build Success Summary
        run: |
          echo "============================================"
          echo "âœ… MI AI Kotlin Android App Built Successfully!"
          echo "============================================"
          echo ""
          echo "ðŸ“± Build Details:"
          echo "   Version: ${{ steps.version.outputs.version }}"
          echo "   Type: Kotlin Android Native"
          echo "   API Target: 34 (Android 14)"
          echo "   Min API: 24 (Android 7.0)"
          echo ""
          echo "ðŸ“¦ Output:"
          echo "   APK File: app-debug.apk"
          echo "   Size: ~40-60 MB"
          echo "   Location: GitHub Releases"
          echo ""
          echo "ðŸš€ Release:"
          echo "   Version: v${{ steps.version.outputs.version }}"
          echo "   Tag: GitHub Releases"
          echo "   Download: Available immediately"
          echo ""
          echo "ðŸ“¥ Installation:"
          echo "   1. Enable Unknown Sources"
          echo "   2. Download APK"
          echo "   3. Install"
          echo "   4. Launch"
          echo ""
          echo "============================================"
          echo "âœ¨ Ready for distribution!"
          echo "============================================"

      - name: ðŸ”” Notify on Failure
        if: failure()
        run: |
          echo "âŒ Build Failed!"
          echo "Check workflow logs above for details"
          exit 1