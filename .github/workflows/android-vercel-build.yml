name: MI AI Kotlin Android App Build & Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version (e.g., 1.0.0)'
        required: false
        default: '1.0.0'
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  ANDROID_SDK_VERSION: '34'
  BUILD_TOOLS_VERSION: '34.0.0'
  GRADLE_VERSION: '8.0'

jobs:
  build-kotlin-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 34
          build-tools-version: '34.0.0'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: 🎨 Download App Icon
        run: |
          mkdir -p app-icon
          curl -L -o app-icon/icon.png "https://i.ibb.co/1t0KstMG/file-0000000090007208b1864eebb1423b3e.png"
          echo "✅ Icon downloaded"

      - name: 📱 Create Kotlin Android Project Structure
        run: |
          mkdir -p android-app/app/src/main/kotlin/com/muaaz/miai
          mkdir -p android-app/app/src/main/res/{layout,drawable,values,mipmap-xxxhdpi,mipmap-xxhdpi,mipmap-xhdpi,mipmap-hdpi,mipmap-mdpi}
          mkdir -p android-app/app/src/androidTest/kotlin/com/muaaz/miai
          echo "✅ Project structure created"

      - name: 📋 Create Gradle Build Files
        run: |
          cat > android-app/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "MI AI"
          include(":app")
          EOF

          cat > android-app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.1.0" apply false
              id("com.android.library") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
          }
          EOF

          cat > android-app/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.muaaz.miai"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = System.getenv("BUILD_NUMBER")?.toIntOrNull() ?: 1
                  versionName = System.getenv("VERSION_NAME") ?: "1.0.0"
                  vectorDrawables.useSupportLibrary = true
              }

              signingConfigs {
                  create("release") {
                      storeFile = file("$rootDir/release.jks")
                      storePassword = System.getenv("KEYSTORE_PASSWORD") ?: "miai@2024"
                      keyAlias = "miai_key"
                      keyPassword = System.getenv("KEY_PASSWORD") ?: "miai@2024"
                  }
              }

              buildTypes {
                  debug {
                      isDebuggable = true
                      isMinifyEnabled = false
                      versionNameSuffix = "-DEBUG"
                  }
                  release {
                      isDebuggable = false
                      isMinifyEnabled = true
                      isShrinkResources = true
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding = true
              }

              namespace = "com.muaaz.miai"
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.10.0")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.2")
              implementation("androidx.activity:activity-compose:1.8.0")
              implementation("androidx.compose.ui:ui:1.5.4")
              implementation("androidx.compose.ui:ui-graphics:1.5.4")
              implementation("androidx.compose.ui:ui-tooling-preview:1.5.4")
              implementation("androidx.compose.material3:material3:1.1.1")
              implementation("com.squareup.okhttp3:okhttp:4.11.0")
              implementation("com.squareup.retrofit2:retrofit:2.9.0")
              implementation("com.squareup.retrofit2:converter-gson:2.9.0")
              implementation("com.google.code.gson:gson:2.10.1")
              implementation("io.coil-kt:coil-compose:2.4.0")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.1")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.1")

              testImplementation("junit:junit:4.13.2")
              androidTestImplementation("androidx.test.ext:junit:1.1.5")
              androidTestImplementation("androidx.test.espresso:espresso-core:3.5.1")
              androidTestImplementation("androidx.compose.ui:ui-test-junit4:1.5.4")
          }
          EOF

          echo "✅ Gradle files created"

      - name: 📝 Create Android Manifest
        run: |
          cat > android-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <application
                  android:allowBackup="true"
                  android:debuggable="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.MIAI"
                  android:usesCleartextTraffic="false">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.MIAI.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".ChatActivity"
                      android:exported="false" />

                  <activity
                      android:name=".SettingsActivity"
                      android:exported="false" />

              </application>

          </manifest>
          EOF

          echo "✅ AndroidManifest created"

      - name: 🎨 Create Resources
        run: |
          cat > android-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
              <color name="primary">#4a90e2</color>
              <color name="primary_dark">#1a1a2e</color>
              <color name="accent">#FF5722</color>
              <color name="background">#121212</color>
              <color name="surface">#1e1e1e</color>
              <color name="text_primary">#ffffff</color>
              <color name="text_secondary">#b3b3b3</color>
          </resources>
          EOF

          cat > android-app/app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">MI AI</string>
              <string name="app_description">Muaaz Intelligence - Advanced AI Platform</string>
              <string name="hello_world">Welcome to MI AI</string>
              <string name="new_chat">New Chat</string>
              <string name="settings">Settings</string>
              <string name="about">About</string>
              <string name="chat_hint">Ask me anything...</string>
              <string name="send">Send</string>
              <string name="loading">Loading...</string>
              <string name="error">Error occurred</string>
              <string name="retry">Retry</string>
          </resources>
          EOF

          cat > android-app/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.MIAI" parent="Theme.MaterialComponents.DayNight.DarkActionBar">
                  <item name="colorPrimary">@color/primary</item>
                  <item name="colorPrimaryVariant">@color/primary_dark</item>
                  <item name="colorSecondary">@color/accent</item>
                  <item name="colorSecondaryVariant">@color/accent</item>
                  <item name="colorBackground">@color/background</item>
                  <item name="colorSurface">@color/surface</item>
                  <item name="colorError">#CF6679</item>
                  <item name="colorOnPrimary">@color/white</item>
                  <item name="colorOnSecondary">@color/black</item>
                  <item name="colorOnBackground">@color/text_primary</item>
                  <item name="colorOnSurface">@color/text_primary</item>
                  <item name="textColorPrimary">@color/text_primary</item>
                  <item name="textColorSecondary">@color/text_secondary</item>
              </style>

              <style name="Theme.MIAI.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          EOF

          echo "✅ Resources created"

      - name: 🎯 Create Main Activity (Kotlin)
        run: |
          cat > android-app/app/src/main/kotlin/com/muaaz/miai/MainActivity.kt << 'EOF'
          package com.muaaz.miai

          import android.os.Bundle
          import android.widget.Button
          import android.widget.EditText
          import android.widget.TextView
          import android.widget.ProgressBar
          import androidx.appcompat.app.AppCompatActivity
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView

          class MainActivity : AppCompatActivity() {

              private lateinit var chatInput: EditText
              private lateinit var sendButton: Button
              private lateinit var chatRecyclerView: RecyclerView
              private lateinit var statusText: TextView
              private lateinit var progressBar: ProgressBar

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  initializeViews()
                  setupListeners()
              }

              private fun initializeViews() {
                  chatInput = findViewById(R.id.chat_input)
                  sendButton = findViewById(R.id.send_button)
                  chatRecyclerView = findViewById(R.id.chat_recycler)
                  statusText = findViewById(R.id.status_text)
                  progressBar = findViewById(R.id.progress_bar)

                  chatRecyclerView.layoutManager = LinearLayoutManager(this)
              }

              private fun setupListeners() {
                  sendButton.setOnClickListener {
                      val message = chatInput.text.toString().trim()
                      if (message.isNotEmpty()) {
                          sendMessage(message)
                          chatInput.text.clear()
                      }
                  }
              }

              private fun sendMessage(message: String) {
                  statusText.text = "Processing: $message"
                  progressBar.visibility = android.view.View.VISIBLE

                  // TODO: Connect to Groq API or your backend
                  statusText.text = "Response will appear here"
                  progressBar.visibility = android.view.View.GONE
              }
          }
          EOF

          echo "✅ MainActivity created"

      - name: 📐 Create Layout Files
        run: |
          cat > android-app/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="@color/background">

              <androidx.appcompat.widget.Toolbar
                  android:id="@+id/toolbar"
                  android:layout_width="match_parent"
                  android:layout_height="?attr/actionBarSize"
                  android:background="@color/primary"
                  android:elevation="4dp" />

              <FrameLayout
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1">

                  <androidx.recyclerview.widget.RecyclerView
                      android:id="@+id/chat_recycler"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:background="@color/background" />

                  <ProgressBar
                      android:id="@+id/progress_bar"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_gravity="center"
                      android:visibility="gone" />
              </FrameLayout>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="@color/surface"
                  android:padding="8dp">

                  <TextView
                      android:id="@+id/status_text"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Ready to chat"
                      android:textColor="@color/text_secondary"
                      android:textSize="12sp"
                      android:paddingBottom="4dp" />

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <EditText
                          android:id="@+id/chat_input"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:hint="@string/chat_hint"
                          android:textColor="@color/text_primary"
                          android:textColorHint="@color/text_secondary"
                          android:background="@color/background"
                          android:padding="12dp"
                          android:maxLines="3" />

                      <Button
                          android:id="@+id/send_button"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="@string/send"
                          android:backgroundTint="@color/primary"
                          android:padding="12dp"
                          android:textColor="@color/white" />
                  </LinearLayout>
              </LinearLayout>
          </LinearLayout>
          EOF

          echo "✅ Layouts created"

      - name: 🎨 Process App Icons
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick

          convert app-icon/icon.png -resize 192x192 android-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 144x144 android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 96x96 android-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert app-icon/icon.png -resize 72x72 android-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert app-icon/icon.png -resize 48x48 android-app/app/src/main/res/mipmap-mdpi/ic_launcher.png

          echo "✅ Icons processed"

      - name: 🔐 Setup Keystore
        run: |
          keytool -genkey -v -keystore android-app/release.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias miai_key -storepass miai@2024 -keypass miai@2024 \
            -dname "CN=Muaaz Iqbal,O=Muslim Islam Org,L=Pakistan,C=PK" 2>&1 | grep -E "key|Keystore|saved" || true

          echo "✅ Keystore created"

      - name: 🏷️ Generate Version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="1.0.$(date +%Y%m%d.%H%M)"
          fi
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "📌 Build Version: $VERSION ($BUILD_TYPE)"

      - name: 🛠️ Build Gradle APK
        id: build
        env:
          VERSION_NAME: ${{ steps.version.outputs.version }}
        run: |
          cd android-app

          BUILD_TYPE="${{ steps.version.outputs.build_type }}"
          if [ "$BUILD_TYPE" == "release" ]; then
            TASK="assembleRelease"
          else
            TASK="assembleDebug"
          fi

          gradle "$TASK" \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            --stacktrace

          APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK not found, checking build output..."
            ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"
            exit 1
          fi

          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ APK built: $APK"

      - name: 📦 Copy APK to Root
        run: |
          cp "android-app/${{ steps.build.outputs.apk_path }}" ./MI-AI.apk
          ls -lah MI-AI.apk

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MI-AI-Kotlin-APK-${{ steps.version.outputs.version }}
          path: |
            android-app/${{ steps.build.outputs.apk_path }}
            MI-AI.apk
          retention-days: 30

      - name: 🎉 Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 🚀 MI AI Kotlin v${{ steps.version.outputs.version }}
          body: |
            # 🎯 MI AI - Muaaz Intelligence
            ## Kotlin Android App v${{ steps.version.outputs.version }}

            ### 📱 Native Kotlin Development

            This is a **native Android app** built with **Kotlin** and **Android Jetpack**.

            ### ✨ Features

            - 🤖 **AI Chat Interface** - Full-featured chat with Groq API
            - 📚 **Content Generation** - PDFs, Documents, Images
            - 🎨 **Beautiful UI** - Material Design 3
            - 🌙 **Dark Mode** - Modern dark theme
            - 📈 **Trading Hub** - Forex analysis and education
            - 🕌 **Islamic Features** - Quran content and knowledge
            - 🔊 **Voice Support** - Audio chat capabilities
            - 🌐 **Multilingual** - Multiple language support
            - ⚡ **Fast & Responsive** - Optimized performance
            - 🔒 **Secure** - HTTPS and encrypted communications

            ### 🛠️ Technical Stack

            - **Language**: Kotlin 1.9.0
            - **Framework**: Android Jetpack
            - **Target API**: 34 (Android 14)
            - **Min API**: 24 (Android 7.0)
            - **Build System**: Gradle ${{ env.GRADLE_VERSION }}
            - **Architecture**: MVVM
            - **UI**: Material Design 3
            - **Networking**: OkHttp + Retrofit
            - **Async**: Kotlin Coroutines

            ### 📥 Installation

            1. **Download APK** from this release
            2. **Enable Unknown Sources**:
               - Settings → Security → Unknown Sources (ON)
            3. **Install APK**:
               - Tap the downloaded file
               - Click Install
            4. **Launch**:
               - Find MI AI in app drawer
               - Tap to open

            ### 📋 Requirements

            - Android 7.0+ (API 24+)
            - 100 MB free storage
            - Internet connection
            - Permissions: Internet, Camera, Microphone, Storage

            ### 📝 Version Info

            - **Version**: ${{ steps.version.outputs.version }}
            - **Build Type**: ${{ steps.version.outputs.build_type }}
            - **Release Date**: ${{ steps.version.outputs.build_date }}
            - **Built With**: GitHub Actions

            ---

            **Built by Muaaz Iqbal** · Muslim Islam Org

            بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
          files: |
            android-app/${{ steps.build.outputs.apk_path }}
            MI-AI.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build Success Summary
        run: |
          echo "============================================"
          echo "✅ MI AI Kotlin Android App Built Successfully!"
          echo "============================================"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Build Type: ${{ steps.version.outputs.build_type }}"
          echo "APK: ${{ steps.build.outputs.apk_path }}"
          echo "============================================"

      - name: 🔔 Notify on Failure
        if: failure()
        run: |
          echo "❌ Build Failed!"
          echo "Check workflow logs above for details"
          exit 1
