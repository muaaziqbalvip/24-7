name: Muslim Islam AI Bot 24/7

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyTelegramBotAPI google-generativeai firebase-admin requests

      - name: Run Muslim Islam AI
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python bot.py
