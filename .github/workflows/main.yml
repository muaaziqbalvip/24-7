name: MI TITAN V22 ETERNAL RUNNER

# Ye bot kab chalega?
on:
  push:
    branches: [ main ]  # Jab aap code push karenge
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-restart (GitHub Actions ki limit manage karne ke liye)
  workflow_dispatch:      # Aap manual bhi button daba kar start kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/set-up-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Takay bar bar install karne mein time zaya na ho

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run MI TITAN PRO V22
        env:
          # Ye variables GitHub Settings > Secrets se uthaye jayenge
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot.py
