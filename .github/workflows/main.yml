# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║   MI AI PRO TITAN V20.0 — GITHUB ACTIONS WORKFLOW                          ║
# ║   ORGANIZATION : MUSLIM ISLAM | MiTV Network                               ║
# ║   ARCHITECT    : MUAAZ IQBAL                                               ║
# ║   PURPOSE      : Run Telegram Bot 24/7 with Auto-Restart every 6 hours     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🤖 MI TITAN V20 — Live Bot 24/7"

on:
  # ── Manual Trigger ───────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual start"
        required: false
        default: "Manual start by Muaaz Iqbal"

  # ── Auto-Trigger: Every 6 hours (keeps bot always alive) ─────────────────────
  # GitHub Actions jobs have a max 6-hour runtime limit.
  # Cron runs every 6 hours to restart the bot automatically.
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC

  # ── Auto-Trigger on Push to main branch ──────────────────────────────────────
  push:
    branches:
      - main
      - master

# ══════════════════════════════════════════════════════════════════════════════
# JOBS
# ══════════════════════════════════════════════════════════════════════════════

jobs:
  run-mi-titan-bot:
    name: "🔥 MI AI TITAN — Live Session"
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5h 50min — just under GitHub's 6h limit

    steps:
      # ── Step 1: Checkout Code ───────────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ── Step 2: Setup Python ────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Step 3: Install Dependencies ────────────────────────────────────────
      - name: "📦 Install Dependencies"
        run: |
          echo "═══════════════════════════════════════════════"
          echo "🔧 Installing MI TITAN V20 Dependencies..."
          echo "═══════════════════════════════════════════════"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo ""
          echo "✅ All dependencies installed successfully!"
          echo "═══════════════════════════════════════════════"

      # ── Step 4: Verify Environment ──────────────────────────────────────────
      - name: "🔍 Verify Environment"
        run: |
          echo "═══════════════════════════════════════════════"
          echo "🛡️  Verifying MI TITAN Environment..."
          echo "═══════════════════════════════════════════════"
          python --version
          pip show pyTelegramBotAPI | grep -E "Name|Version"
          pip show requests         | grep -E "Name|Version"
          pip show duckduckgo-search | grep -E "Name|Version"
          echo ""
          echo "✅ Environment check complete!"
          echo "═══════════════════════════════════════════════"
        env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          ADMIN_ID:       ${{ secrets.ADMIN_ID }}

      # ── Step 5: Boot MI AI TITAN BOT ────────────────────────────────────────
      - name: "🚀 Launch MI AI TITAN V20 — LIVE"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║   🔥  MI AI PRO TITAN V20.0 LAUNCHING...    ║"
          echo "║   👨‍💻  Architect: Muaaz Iqbal                ║"
          echo "║   🏢  Org: MUSLIM ISLAM | MiTV Network       ║"
          echo "║   🕒  $(date '+%Y-%m-%d %H:%M:%S UTC')       ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          python bot.py
        env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          ADMIN_ID:       ${{ secrets.ADMIN_ID }}

      # ── Step 6: On Failure — Log and Notify ─────────────────────────────────
      - name: "⚠️ On Failure Report"
        if: failure()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║   ❌  MI TITAN BOT CRASHED                   ║"
          echo "║   🔄  Next auto-restart: within 6 hours     ║"
          echo "║   🕒  $(date '+%Y-%m-%d %H:%M:%S UTC')       ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "Check logs above for error details."
          echo "Bot will auto-restart via cron schedule."

      # ── Step 7: On Success ──────────────────────────────────────────────────
      - name: "✅ Session Complete"
        if: success()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║   ✅  SESSION COMPLETE                       ║"
          echo "║   🔄  Auto-restart scheduled in ~6 hours    ║"
          echo "╚══════════════════════════════════════════════╝"
