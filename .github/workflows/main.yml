name: MI TITAN V22 ETERNAL RUNNER

# Ye bot kab trigger hoga
on:
  push:
    branches: [ main ]  # Code push hone par start hoga
  workflow_dispatch:      # Manual button se bhi start kar sakte hain
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad auto-refresh (GitHub rules ke liye)

jobs:
  titan-runtime:
    runs-on: ubuntu-latest
    
    # Bot ko lagatar chalne ki permission dena
    permissions:
      contents: write

    steps:
      - name: 📥 Repository Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python Environment Setup
        uses: actions/set-up-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Dependencies Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Start MI TITAN PRO V22
        env:
          # In ko aapne GitHub Repo > Settings > Secrets mein lazmi dalna hai
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Bot ko background mein nahi, seedha run karenge taake GitHub logs dikhaye
          python bot.py
