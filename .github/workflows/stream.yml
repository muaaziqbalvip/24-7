name: 24/7 Live Stream Engine

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/25 * * * *'  # Auto-restart every 25 min (GitHub limit safety)

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install FFmpeg & Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg curl jq

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Fetch Stream Config from Firebase
        run: |
          curl -s "https://ramadan-2385b-default-rtdb.firebaseio.com/stream_config.json" > /tmp/config.json
          cat /tmp/config.json

      - name: Start 24/7 Stream Loop
        env:
          FIREBASE_URL: https://ramadan-2385b-default-rtdb.firebaseio.com
        run: |
          bash stream_engine.sh
        timeout-minutes: 350
