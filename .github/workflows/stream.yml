name: MiTV 24/7 Live Stream

on:
  workflow_dispatch:
  schedule:
    # Restart every 5 hours 50 min (GitHub Actions max is 6h)
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip curl jq python3-dev

      - name: Install Python dependencies
        run: |
          pip3 install --break-system-packages yt-dlp requests || pip3 install yt-dlp requests

      - name: Verify FFmpeg
        run: ffmpeg -version | head -1

      - name: Run Stream Engine
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          python3 stream-engine.py

      - name: Auto-restart notice
        if: always()
        run: |
          echo "Stream ended at $(date) — auto-restart via schedule cron"
