<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MiTV Stream Overlay v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:Arial,sans-serif}

#videoContainer{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
#mainVideo{width:100%;height:100%;object-fit:cover;transform-origin:center;transition:transform .5s,filter .5s}

/* LOGO */
#logoOverlay{position:absolute;z-index:10;display:none}
#logoOverlay img{display:block;border-radius:6px}
#logoOverlay.top-left    {top:20px;left:20px}
#logoOverlay.top-right   {top:20px;right:20px}
#logoOverlay.top-center  {top:20px;left:50%;transform:translateX(-50%)}
#logoOverlay.bottom-left {bottom:60px;left:20px}
#logoOverlay.bottom-right{bottom:60px;right:20px}

@keyframes logoPulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes logoBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes logoRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 5px rgba(255,255,255,.5))}50%{filter:drop-shadow(0 0 20px #fff)}}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.05)}}
.anim-pulse{animation:logoPulse 2s infinite}
.anim-bounce{animation:logoBounce 1.5s infinite}
.anim-rotate{animation:logoRotate 10s linear infinite}
.anim-glow{animation:logoGlow 2s infinite}
.anim-float{animation:logoFloat 3s ease-in-out infinite}

/* WATERMARK */
#watermark{position:absolute;bottom:60px;right:14px;font-size:12px;color:rgba(255,255,255,.3);letter-spacing:1px;z-index:10;pointer-events:none}

/* TICKER */
#tickerBar{position:absolute;bottom:0;left:0;right:0;height:44px;z-index:20;display:flex;align-items:center;overflow:hidden}
#tickerBg{position:absolute;inset:0}
#tickerLabel{padding:0 14px;height:100%;display:flex;align-items:center;font-weight:900;font-size:14px;letter-spacing:2px;white-space:nowrap;color:#fff;flex-shrink:0;position:relative;z-index:1;background:rgba(0,0,0,.3)}
#tickerTrack{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;position:relative;z-index:1}
#tickerContent{white-space:nowrap;font-size:15px;font-weight:600;letter-spacing:.5px;display:inline-block;padding-left:100%}

@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes tickerFade{0%,100%{opacity:0}10%,90%{opacity:1}}
@keyframes tickerFlash{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes tickerWave{0%{transform:translateY(0)}25%{transform:translateY(-3px)}75%{transform:translateY(3px)}100%{transform:translateY(0)}}
.ticker-scroll #tickerContent{animation:tickerScroll 30s linear infinite}
.ticker-fade #tickerContent{animation:tickerFade 5s ease-in-out infinite;padding-left:20px}
.ticker-flash #tickerLabel{animation:tickerFlash 1s infinite}
.ticker-wave #tickerContent{animation:tickerWave 2s ease-in-out infinite;padding-left:20px}
.ticker-typewriter #tickerContent{overflow:hidden;white-space:nowrap;border-right:2px solid #fff;animation:tickerTypewriter 6s steps(40) infinite,blink .75s step-end infinite;padding-left:20px;max-width:80vw}
@keyframes tickerTypewriter{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}
.ticker-slide #tickerContent{animation:tickerSlide 4s ease-in-out infinite;padding-left:100%}
@keyframes tickerSlide{0%{transform:translateX(0)}40%{transform:translateX(-50%)}60%{transform:translateX(-50%)}100%{transform:translateX(-100%)}}

/* LIVE BADGE */
#liveTag{position:absolute;top:14px;right:14px;z-index:15;background:#e00;color:#fff;font-size:11px;font-weight:900;letter-spacing:2px;padding:4px 10px;border-radius:4px;display:none}
#liveTag.show{display:block;animation:logoPulse 1s infinite}

/* CHANNEL TITLE */
#channelTitle{position:absolute;top:14px;left:14px;z-index:15;font-size:14px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:1px;text-shadow:0 0 10px rgba(0,0,0,.8);display:none}

/* COUNTRY CLOCKS overlay (optional) */
#clocksOverlay{position:absolute;top:52px;right:14px;z-index:15;display:none;flex-direction:column;gap:4px}
.ov-clock{background:rgba(0,0,0,.65);backdrop-filter:blur(4px);border-left:2px solid;border-radius:4px;padding:3px 8px;font-size:11px;font-family:'Courier New',monospace;white-space:nowrap}
.ov-clock-time{font-weight:800;letter-spacing:1px}
.ov-clock-name{opacity:.6;font-size:9px}

/* DATETIME OVERLAY */
#datetimeOverlay{position:absolute;top:14px;right:120px;z-index:15;
  font-size:14px;font-family:'Courier New',monospace;color:rgba(255,255,255,.85);
  text-shadow:0 0 8px rgba(0,0,0,.8);display:none;font-weight:700}

/* LOADING */
#loadingScreen{position:absolute;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mitv-logo{font-family:'Arial Black',sans-serif;font-size:54px;font-weight:900;letter-spacing:4px;margin-bottom:20px;
  background:linear-gradient(90deg,#ffd700,#00d4ff,#ff3d6b,#ffd700);
  background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:gradShift 3s linear infinite}
@keyframes gradShift{0%{background-position:0%}100%{background-position:300%}}
.loading-bar{width:220px;height:3px;background:#111;border-radius:2px;overflow:hidden}
.loading-bar-inner{height:100%;background:linear-gradient(90deg,#ffd700,#00d4ff,#ff3d6b);
  background-size:200% 100%;animation:loadBar 1.5s ease-in-out infinite}
@keyframes loadBar{0%{background-position:200% 0}100%{background-position:0% 0;transform:translateX(110%)}}
#loadingStatus{color:#4a6680;font-size:12px;margin-top:14px;letter-spacing:2px}
.loading-dots::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

/* RESUME INDICATOR */
#resumeToast{position:absolute;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.4);
  color:#00d4ff;padding:6px 16px;border-radius:20px;font-size:11px;
  font-weight:700;letter-spacing:1px;z-index:30;opacity:0;transition:opacity .5s}
#resumeToast.show{opacity:1}
</style>
</head>
<body id="body">

<div id="loadingScreen">
  <div class="mitv-logo">MiTV</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
  <div id="loadingStatus" class="loading-dots">CONNECTING</div>
</div>

<div id="videoContainer">
  <video id="mainVideo" autoplay muted playsinline></video>
</div>

<div id="liveTag">● LIVE</div>
<div id="channelTitle"></div>
<div id="datetimeOverlay"></div>
<div id="resumeToast">▶ RESUMING PLAYBACK</div>

<div id="clocksOverlay"></div>

<div id="logoOverlay" class="top-left">
  <img id="logoImg" src="" alt="">
</div>

<div id="watermark">MiTV Network</div>

<div id="tickerBar">
  <div id="tickerBg"></div>
  <div id="tickerLabel">📺 LIVE</div>
  <div id="tickerTrack"><div id="tickerContent">MiTV Network • 24/7 Live • Loading...</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FC = {
  apiKey:"AIzaSyBbnU8DkthpYQMHOLLyj6M0cc05qXfjMcw",
  authDomain:"ramadan-2385b.firebaseapp.com",
  databaseURL:"https://ramadan-2385b-default-rtdb.firebaseio.com",
  projectId:"ramadan-2385b",
  storageBucket:"ramadan-2385b.firebasestorage.app",
  messagingSenderId:"882828936310",
  appId:"1:882828936310:web:7f97b921031fe130fe4b57"
};
const db  = getDatabase(initializeApp(FC));
const vid = document.getElementById('mainVideo');

// ── Playback position persistence (no restart on refresh) ─────────────────
function posKey(src) {
  return 'mitv_pos_' + btoa(unescape(encodeURIComponent(src))).replace(/[^a-z0-9]/gi,'').substr(0,24);
}
function savePos() {
  if(vid.currentTime > 2 && !vid.paused)
    localStorage.setItem(posKey(vid.src), Math.floor(vid.currentTime));
}
function restorePos(isLive) {
  if(isLive) return; // don't seek for live streams
  const saved = parseInt(localStorage.getItem(posKey(vid.src)) || '0');
  if(saved > 4) {
    vid.currentTime = saved;
    const t = document.getElementById('resumeToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
}
setInterval(savePos, 2000);

// ── Stream offset sync (continuous play across restarts) ──────────────────
let streamStartedAt = 0;
function syncOffset(videoDuration) {
  if(!streamStartedAt || !videoDuration || videoDuration === Infinity) return;
  const elapsedSec = (Date.now() - streamStartedAt) / 1000;
  const offset     = elapsedSec % videoDuration;
  if(Math.abs(vid.currentTime - offset) > 5) {
    vid.currentTime = offset;
  }
}

// ── Loading UI ─────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('loadingStatus').textContent = msg; }
function hideLoading() {
  const ls = document.getElementById('loadingScreen');
  ls.style.transition = 'opacity 1s';
  ls.style.opacity    = '0';
  setTimeout(() => ls.style.display = 'none', 1000);
}

// ── M3U parser ─────────────────────────────────────────────────────────────
async function parseM3U(url) {
  const res  = await fetch(url, {cache:'no-cache'});
  const text = await res.text();
  return text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
}

// ── Country clocks overlay ─────────────────────────────────────────────────
const OV_CLOCKS = [
  {name:'PKT', tz:'Asia/Karachi',   color:'#ffd700'},
  {name:'GST', tz:'Asia/Dubai',     color:'#00d4ff'},
  {name:'IST', tz:'Asia/Kolkata',   color:'#ff9933'},
  {name:'GMT', tz:'Europe/London',  color:'#00ff88'},
  {name:'EST', tz:'America/New_York',color:'#ff3d6b'},
];
function buildOverlayClocks(show) {
  const box = document.getElementById('clocksOverlay');
  box.style.display = show ? 'flex' : 'none';
  if(!show) return;
  box.innerHTML = OV_CLOCKS.map((c,i) =>
    `<div class="ov-clock" id="ov${i}" style="border-color:${c.color}">
      <span class="ov-clock-time" style="color:${c.color}" id="ovt${i}">--:--</span>
      <span class="ov-clock-name"> ${c.name}</span>
    </div>`).join('');
  function tickOv() {
    OV_CLOCKS.forEach((c,i) => {
      const d  = new Date(new Date().toLocaleString('en-US',{timeZone:c.tz}));
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const el = document.getElementById(`ovt${i}`);
      if(el) el.textContent = `${hh}:${mm}`;
    });
  }
  tickOv(); setInterval(tickOv, 1000);
}

// ── DateTime overlay ───────────────────────────────────────────────────────
function startDatetime() {
  const el = document.getElementById('datetimeOverlay');
  el.style.display = 'block';
  function tick() {
    const d  = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    el.textContent = `${hh}:${mm}:${ss}`;
  }
  tick(); setInterval(tick, 1000);
}

// ── Main Firebase listener ─────────────────────────────────────────────────
let currentSrc = '';
onValue(ref(db,'mitv_stream'), async snap => {
  const data = snap.val();
  if(!data) { setStatus('NO CONFIG IN FIREBASE'); return; }

  // Stream start time for offset sync
  if(data.status?.startedAt) streamStartedAt = data.status.startedAt;

  // Transform
  if(data.transform) {
    const t     = data.transform;
    const scale = (t.zoom||100)/100;
    const tx    = t.posX||0;
    const ty    = t.posY||0;
    const br    = (t.brightness||100)/100;
    vid.style.transform = `scale(${scale}) translate(${tx}px,${ty}px)`;
    let flt = `brightness(${br})`;
    if(data.effects) {
      const e = data.effects;
      if(e.contrast)   flt += ` contrast(${e.contrast/100})`;
      if(e.saturation) flt += ` saturate(${e.saturation/100})`;
      if(e.blur)       flt += ` blur(${e.blur/3}px)`;
      if(e.hue)        flt += ` hue-rotate(${e.hue}deg)`;
    }
    vid.style.filter = flt;
    vid.volume = Math.min(2, (t.volume||100)/100);
  }

  // Logo
  if(data.logo?.url) {
    const lo = document.getElementById('logoOverlay');
    const li = document.getElementById('logoImg');
    li.src         = data.logo.url;
    li.style.width = (data.logo.size||80)+'px';
    lo.className   = data.logo.position||'top-left';
    lo.style.display='block';
    const anim = data.logo.animation||'pulse';
    li.className   = anim!=='none'?'anim-'+anim:'';
  } else {
    document.getElementById('logoOverlay').style.display='none';
  }

  // Ticker
  if(data.ticker) {
    const tk  = data.ticker;
    document.getElementById('tickerContent').textContent = tk.text||'MiTV • 24/7 Live';
    document.getElementById('tickerBg').style.background = tk.bg||'#cc0000';
    const lbl  = document.getElementById('tickerLabel');
    lbl.textContent = tk.label||'📺 LIVE';
    lbl.style.color = tk.color||'#fff';
    document.getElementById('tickerContent').style.color = tk.color||'#fff';
    const speeds = {slow:'50s',medium:'30s',fast:'15s',vfast:'8s'};
    const spd   = speeds[tk.speed]||'30s';
    const anim  = tk.animation||'scroll';
    document.getElementById('tickerBar').className = 'ticker-'+anim;
    document.getElementById('tickerContent').style.animationDuration = spd;
  }

  // Branding
  if(data.branding) {
    document.getElementById('watermark').textContent = data.branding.watermarkText||'MiTV Network';
    const ct = document.getElementById('channelTitle');
    if(data.branding.channelName) {
      ct.textContent = data.branding.channelName;
      ct.style.display='block';
    }
  }

  // Extras
  if(data.showDateTime) startDatetime();
  if(data.showClocks)   buildOverlayClocks(true);

  // Status
  const liveEl = document.getElementById('liveTag');
  liveEl.className = data.status?.live ? 'show' : '';

  // Source
  if(!data.source?.url) { setStatus('NO SOURCE URL'); return; }
  const s = data.source;
  const newSrc = s.url;

  if(newSrc === currentSrc && !vid.paused && !vid.ended) {
    // Same source still playing — don't reload
    return;
  }
  currentSrc = newSrc;

  setStatus('LOADING...');

  try {
    if(s.type === 'mp4') {
      if(vid.src !== newSrc) {
        vid.src  = newSrc;
        vid.loop = s.loop !== 'once';
        vid.addEventListener('loadedmetadata', () => {
          restorePos(false);
          if(streamStartedAt) syncOffset(vid.duration);
        }, {once:true});
        await vid.play().catch(() => { vid.muted=true; vid.play(); });
      }
      hideLoading();

    } else if(s.type === 'm3u' || s.type === 'm3u8') {
      setStatus('PARSING M3U...');
      let streamUrl = newSrc;
      if(!newSrc.endsWith('.m3u8') && !newSrc.includes('/stream')) {
        const streams = await parseM3U(newSrc);
        const idx = Math.min(s.index||0, streams.length-1);
        streamUrl = streams[idx] || newSrc;
      }
      // HLS native or use video src directly
      if(vid.canPlayType('application/vnd.apple.mpegurl') || vid.canPlayType('application/x-mpegurl')) {
        vid.src = streamUrl;
        await vid.play().catch(() => { vid.muted=true; vid.play(); });
      } else {
        // Try hls.js if available
        if(window.Hls?.isSupported()) {
          const hls = new Hls({enableWorker:false});
          hls.loadSource(streamUrl);
          hls.attachMedia(vid);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            vid.play().catch(() => { vid.muted=true; vid.play(); });
          });
        } else {
          vid.src = streamUrl;
          await vid.play().catch(() => { vid.muted=true; vid.play(); });
        }
      }
      hideLoading();

    } else if(s.type === 'youtube') {
      setStatus('YOUTUBE: RUNNING VIA GITHUB ACTIONS');
      hideLoading();
    }

  } catch(e) {
    setStatus('ERROR: ' + e.message);
    setTimeout(() => { vid.load(); vid.play().catch(()=>{}); }, 4000);
  }
});

// ── Auto-recovery ──────────────────────────────────────────────────────────
vid.addEventListener('ended', () => {
  vid.currentTime = 0;
  vid.play().catch(()=>{});
});
vid.addEventListener('error', () => {
  console.warn('Video error — retrying...');
  setTimeout(() => { vid.load(); vid.play().catch(()=>{}); }, 3000);
});
vid.addEventListener('stalled', () => {
  setTimeout(() => { if(vid.readyState < 3) { vid.load(); vid.play().catch(()=>{}); } }, 5000);
});
</script>

<!-- Load hls.js for non-Safari browsers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
</body>
</html>
