<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MiTV Network — Multi-Channel Control</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic&family=Noto+Nastaliq+Urdu&family=Noto+Kufi+Arabic&family=Noto+Sans&family=Noto+Sans:wght@700&family=Roboto&family=Roboto+Condensed&family=Lato&family=Cantarell&family=Noto+Serif&family=Fira+Code&display=swap">
<!-- Web-safe font stacks approximate the server-rendered libass fonts for
     this LIVE PREVIEW box only. The actual on-air ticker is rendered by
     FFmpeg/libass using the real installed system fonts (see Dockerfile) -
     the mapping below just makes the dashboard preview visually match. -->
<script>
  const FONT_PREVIEW_MAP = {
    "Noto Naskh Arabic": "'Noto Naskh Arabic', serif",
    "Noto Nastaliq Urdu": "'Noto Nastaliq Urdu', serif",
    "Noto Kufi Arabic": "'Noto Kufi Arabic', sans-serif",
    "Noto Sans": "'Noto Sans', sans-serif",
    "Noto Sans Bold": "'Noto Sans', sans-serif",
    "Roboto": "'Roboto', sans-serif",
    "Roboto Condensed": "'Roboto Condensed', sans-serif",
    "Lato": "'Lato', sans-serif",
    "Cantarell": "'Cantarell', sans-serif",
    "DejaVu Sans": "'DejaVu Sans', Verdana, sans-serif",
    "DejaVu Sans Bold": "'DejaVu Sans', Verdana, sans-serif",
    "FreeSans": "Helvetica, Arial, sans-serif",
    "Liberation Sans": "Arial, sans-serif",
    "Liberation Sans Bold": "Arial, sans-serif",
    "Noto Serif": "'Noto Serif', serif",
    "Liberation Serif": "'Times New Roman', serif",
    "DejaVu Serif": "Georgia, serif",
    "DejaVu Sans Mono": "'Courier New', monospace",
    "Liberation Mono": "'Courier New', monospace",
    "Fira Code": "'Fira Code', monospace",
  };
</script>

<style>
  :root{
    --bg:#08090b; --panel:#12141a; --panel-2:#191c24; --line:#262a35;
    --accent:#d4af37; --accent-dim:#8a712a;
    --text:#eae7da; --text-dim:#8d92a3;
    --danger:#e0554a; --ok:#39d98a; --radius:14px;
    --depth-1: 0 1px 0 rgba(255,255,255,0.04) inset, 0 10px 24px -12px rgba(0,0,0,0.65);
    --depth-2: 0 1px 0 rgba(255,255,255,0.06) inset, 0 18px 40px -16px rgba(0,0,0,0.7);
  }
  /* Theme palettes - swapped per selected channel */
  [data-theme="gold"]     { --accent:#d4af37; --accent-dim:#8a712a; }
  [data-theme="emerald"]  { --accent:#2f9e6f; --accent-dim:#1f6b4a; }
  [data-theme="royal"]    { --accent:#5b7fd4; --accent-dim:#3c5799; }
  [data-theme="crimson"]  { --accent:#d4573f; --accent-dim:#8f3826; }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text); min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background-image:
      radial-gradient(circle at 12% -10%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 42%),
      radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--accent) 6%, transparent), transparent 38%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }
  header{
    padding:16px 14px 10px; border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20; background:rgba(8,9,11,0.88); backdrop-filter:blur(10px) saturate(140%);
  }
  .brand{display:flex; align-items:center; gap:12px; margin-bottom:12px;}

  /* --- 3D animated logo puck: rotating beveled disc with an on-air ring --- */
  .mark3d{
    position:relative; width:42px; height:42px; flex-shrink:0;
    perspective:300px;
  }
  .mark3d .puck{
    position:absolute; inset:0; border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, color-mix(in srgb, var(--accent) 90%, white 10%), var(--accent) 40%, var(--accent-dim) 78%, #000 100%);
    box-shadow:
      0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent),
      0 6px 14px -4px color-mix(in srgb, var(--accent) 55%, transparent),
      inset 0 2px 3px rgba(255,255,255,0.55),
      inset 0 -6px 8px rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; color:#0b0d0a; font-size:16px; letter-spacing:-0.5px;
    animation: puckSpin 7s linear infinite;
    transform-style:preserve-3d;
  }
  .mark3d .puck::after{
    content:""; position:absolute; inset:-4px; border-radius:50%;
    border:1px solid color-mix(in srgb, var(--accent) 55%, transparent);
    opacity:0.5; animation: ringPulse 2.4s ease-in-out infinite;
  }
  @keyframes puckSpin{
    0%{ transform: rotateY(0deg); }
    100%{ transform: rotateY(360deg); }
  }
  @keyframes ringPulse{
    0%,100%{ transform:scale(1); opacity:0.55; }
    50%{ transform:scale(1.18); opacity:0.05; }
  }
  .brand h1{font-size:16px;margin:0; letter-spacing:0.2px;}
  .brand span{display:block;font-size:11px;color:var(--text-dim);margin-top:1px; font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  /* --- live waveform strip: ambient "on-air" telemetry --- */
  .waveform{display:flex; align-items:flex-end; gap:2px; height:16px; margin-left:auto; opacity:0.85;}
  .waveform span{
    width:3px; border-radius:2px;
    background:linear-gradient(180deg, var(--accent), var(--accent-dim));
    animation: wf 1.1s ease-in-out infinite;
  }
  .waveform span:nth-child(1){height:40%; animation-delay:-0.9s;}
  .waveform span:nth-child(2){height:80%; animation-delay:-0.6s;}
  .waveform span:nth-child(3){height:55%; animation-delay:-1.1s;}
  .waveform span:nth-child(4){height:95%; animation-delay:-0.3s;}
  .waveform span:nth-child(5){height:65%; animation-delay:-0.7s;}
  .waveform span:nth-child(6){height:35%; animation-delay:-0.15s;}
  @keyframes wf{ 0%,100%{ transform:scaleY(0.4); } 50%{ transform:scaleY(1); } }
  @media (prefers-reduced-motion: reduce){
    .mark3d .puck, .mark3d .puck::after, .waveform span{ animation:none !important; }
  }

  .channel-tabs{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;}
  .channel-tabs::-webkit-scrollbar{display:none;}
  .ch-tab{
    flex-shrink:0; display:flex; align-items:center; gap:6px;
    padding:8px 14px; border-radius:999px; border:1px solid var(--line);
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    box-shadow:var(--depth-1);
    font-size:13px; font-weight:600; color:var(--text-dim);
    cursor:pointer; white-space:nowrap; transition:transform 0.15s, border-color 0.15s;
  }
  .ch-tab:active{transform:scale(0.97);}
  .ch-tab.active{border-color:var(--accent); color:var(--accent); background:color-mix(in srgb, var(--accent) 14%, var(--panel));}
  .ch-tab .dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);}
  .ch-tab .dot.live{background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 1.6s infinite;}
  .ch-tab .dot.error{background:var(--danger);}
  .ch-tab.add{color:var(--accent); border-style:dashed;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

  main{max-width:720px;margin:0 auto;padding:16px 14px 90px;}
  .card{
    background:linear-gradient(165deg, var(--panel-2), var(--panel));
    border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;
    box-shadow:var(--depth-1);
    position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 45%, transparent), transparent);
  }
  .card h2{margin:0 0 12px; font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent); font-weight:700; font-family:ui-monospace,"SF Mono",Menlo,monospace;}
  .row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .row:last-child{margin-bottom:0;}
  label{font-size:14px;}
  .hint{font-size:11px; color:var(--text-dim); margin-top:4px;}

  .switch{position:relative; width:52px; height:28px; flex-shrink:0;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; background:#2a2f1f; border-radius:28px; cursor:pointer; transition:0.2s; border:1px solid var(--line);}
  .slider:before{content:""; position:absolute; width:20px; height:20px; left:3px; top:3px; background:var(--text-dim); border-radius:50%; transition:0.2s;}
  input:checked + .slider{background:color-mix(in srgb, var(--ok) 25%, transparent); border-color:var(--ok);}
  input:checked + .slider:before{transform:translateX(24px); background:var(--ok);}

  input[type=text], input[type=url], input[type=time], textarea, select{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:14px; outline:none;
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.35); transition:border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, textarea:focus, select:focus{
    border-color:var(--accent-dim);
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.35), 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  textarea{resize:vertical; min-height:44px;}

  button{border:none; border-radius:8px; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer; transition:transform 0.1s;}
  button:active{transform:scale(0.97) translateY(1px);}
  .btn-accent{background:linear-gradient(180deg, color-mix(in srgb, var(--accent) 115%, white 10%), var(--accent-dim)); color:#0b0d0a; box-shadow:0 4px 10px -4px color-mix(in srgb, var(--accent) 60%, transparent), inset 0 1px 0 rgba(255,255,255,0.4);}
  .btn-accent:active{transform:scale(0.98);}
  .btn-outline{background:transparent; border:1px solid var(--line); color:var(--text);}
  .btn-danger{background:transparent; border:1px solid var(--danger); color:#e08a76;}
  .btn-full{width:100%;}

  .speed-row{display:flex; gap:8px; margin-bottom:10px;}
  .speed-btn{flex:1; background:var(--panel-2); border:1px solid var(--line); color:var(--text-dim); padding:10px 0; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer;}
  .speed-btn.active{background:color-mix(in srgb, var(--accent) 15%, transparent); border-color:var(--accent); color:var(--accent);}

  .theme-row{display:flex; gap:8px;}
  .theme-swatch{
    flex:1; height:40px; border-radius:8px; border:2px solid var(--line); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#0b0d0a;
  }
  .theme-swatch.active{border-color:#fff;}
  .theme-swatch[data-t="gold"]{background:#d4af37;}
  .theme-swatch[data-t="emerald"]{background:#2f9e6f;}
  .theme-swatch[data-t="royal"]{background:#5b7fd4;}
  .theme-swatch[data-t="crimson"]{background:#d4573f;}

  .playlist-item{display:flex; align-items:center; gap:10px; padding:10px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; background:var(--panel-2);}
  .playlist-item.now{border-color:var(--accent);}
  .playlist-item .info{flex:1; min-width:0;}
  .playlist-item .title{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .playlist-item .url{font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .icon-btn{background:transparent; border:none; color:var(--text-dim); font-size:16px; padding:4px 8px; cursor:pointer;}
  .icon-btn.del:hover{color:var(--danger);}

  .add-form{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
  .add-form .fields{display:flex; flex-direction:column; gap:8px;}

  .now-next{display:flex; gap:10px;}
  .np-box{flex:1; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:10px;}
  .np-box .label{font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); margin-bottom:4px;}
  .np-box .val{font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  .preview-frame{
    width:100%; aspect-ratio:16/9; border-radius:8px; background:#000; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:12px; overflow:hidden;
    position:relative; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03), 0 12px 30px -14px rgba(0,0,0,0.8);
  }
  .preview-frame iframe{width:100%; height:100%; border:0;}
  #previewPlaceholder{padding:0 20px; text-align:center; line-height:1.5;}
  .card h2 .preview-badge{
    float:right; font-size:9px; letter-spacing:1px; padding:2px 7px; border-radius:5px;
    background:color-mix(in srgb, var(--accent) 18%, transparent); color:var(--accent); font-weight:800;
  }

  .m3u-row{display:flex; gap:8px;}
  .m3u-row input{flex:1; font-size:12px;}

  .logo-preview{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--line); background:var(--panel-2);}

  .range-row{margin-bottom:14px;}
  .range-row:last-child{margin-bottom:0;}
  .range-row .range-label{display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:6px;}
  .range-row .range-label b{color:var(--accent); font-weight:700;}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:6px; border-radius:6px;
    background:var(--panel-2); border:1px solid var(--line); outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:var(--accent); border:2px solid #0b0d0a; cursor:pointer; margin-top:-1px;
  }
  input[type=range]::-moz-range-thumb{
    width:18px; height:18px; border-radius:50%; background:var(--accent); border:2px solid #0b0d0a; cursor:pointer;
  }

  input[type=color]{
    -webkit-appearance:none; width:44px; height:38px; padding:2px; border-radius:8px;
    border:1px solid var(--line); background:var(--panel-2); cursor:pointer; flex-shrink:0;
  }
  input[type=color]::-webkit-color-swatch{border:none; border-radius:6px;}
  input[type=color]::-webkit-color-swatch-wrapper{padding:2px;}

  .ticker-style-row{display:flex; gap:8px; align-items:center; margin-bottom:10px;}
  .ticker-style-row select{flex:1;}
  .font-preview{
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    padding:14px 12px; margin-bottom:10px; font-size:22px; text-align:center;
    color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    min-height:34px; transition:font-family 0.15s;
  }

  .logo-mini{
    position:relative; width:100%; aspect-ratio:16/9; background:#000;
    border:1px solid var(--line); border-radius:8px; margin-bottom:14px; overflow:hidden;
  }
  .logo-mini .zone{position:absolute; left:0; right:0; bottom:0; height:22%; background:rgba(0,0,0,0.5); border-top:2px solid var(--accent);}
  .logo-mini .dot{
    position:absolute; width:16px; height:16px; border-radius:5px;
    background:var(--accent); border:2px solid #0b0d0a; transform:translate(-50%,-50%);
    box-shadow:0 0 8px color-mix(in srgb, var(--accent) 70%, transparent);
  }

  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--panel); border:1px solid var(--accent-dim); color:var(--text); padding:10px 18px; border-radius:8px; font-size:13px; opacity:0; transition:0.25s; pointer-events:none; z-index:100;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:200; padding:20px;}
  .modal-backdrop.show{display:flex;}
  .modal{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; width:100%; max-width:380px;}
  .modal h3{margin:0 0 12px; font-size:15px;}
  .modal .add-form{margin-top:0;}

  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
</style>
</head>
<body data-theme="gold">

<header>
  <div class="brand">
    <div class="mark3d"><div class="puck">M</div></div>
    <div><h1>MiTV Network</h1><span>ON-AIR · MULTI-CHANNEL CONTROL</span></div>
    <div class="waveform" id="headerWaveform" title="Engine keep-alive: pulsing = alive">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="channel-tabs" id="channelTabs"></div>
</header>

<main id="mainContent">
  <div class="hint" style="text-align:center; padding:30px 0;">Loading channels…</div>
</main>

<div class="toast" id="toast"></div>

<!-- Add Channel Modal -->
<div class="modal-backdrop" id="addChannelModal">
  <div class="modal">
    <h3>Add New Channel</h3>
    <div class="add-form">
      <input type="text" id="newChannelId" placeholder="Channel ID (e.g. quran-tv, no spaces)">
      <input type="text" id="newChannelName" placeholder="Channel display name">
      <button class="btn-accent" id="confirmAddChannel">Create Channel</button>
      <button class="btn-outline" id="cancelAddChannel">Cancel</button>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBbnU8DkthpYQMHOLLyj6M0cc05qXfjMcw",
    authDomain: "ramadan-2385b.firebaseapp.com",
    databaseURL: "https://ramadan-2385b-default-rtdb.firebaseio.com",
    projectId: "ramadan-2385b",
    storageBucket: "ramadan-2385b.firebasestorage.app",
    messagingSenderId: "882828936310",
    appId: "1:882828936310:web:7f97b921031fe130fe4b57"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const channelsRef = db.ref('channels');

  let activeChannelId = null;
  let channelsCache = {};
  let engineBaseUrl = localStorage.getItem('mitv_engine_base') || '';

  function toast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(()=> el.classList.remove('show'), 2200);
  }

  function escapeHtml(str){
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function clampHexColor(hex){
    return (hex && /^#?[0-9A-Fa-f]{6}$/.test(hex)) ? (hex.startsWith('#') ? hex : '#'+hex) : '#FFFFFF';
  }

  function updateLogoDot(xPct, yPct){
    const dot = document.getElementById('logoDot');
    if(!dot) return;
    dot.style.left = xPct + '%';
    dot.style.top = yPct + '%';
  }

  // ---------------------------------------------------------------
  // Engine health poll - reflects keep-alive status in the header
  // waveform (dim/still = engine unreachable, this Space may have
  // gone idle/restarted; not a hard guarantee, just a visible signal).
  // ---------------------------------------------------------------
  function pollEngineHealth(){
    if(!engineBaseUrl){ return; }
    const wf = document.getElementById('headerWaveform');
    fetch(`${engineBaseUrl.replace(/\/$/,'')}/health`, { cache: 'no-store' })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(() => { if(wf) wf.style.opacity = '0.85'; })
      .catch(() => { if(wf) wf.style.opacity = '0.2'; });
  }
  pollEngineHealth();
  setInterval(pollEngineHealth, 60000);

  // ---------------------------------------------------------------
  // Bootstrap: if no channels exist yet, seed one "default" channel
  // ---------------------------------------------------------------
  channelsRef.once('value').then(snap=>{
    if(!snap.exists()){
      channelsRef.child('default').set({
        meta:{ name:"Main Channel", logo_url:"", logo_x:4, logo_y:4, logo_width:120, theme:"gold", youtube_video_id:"", public_stream_url:"" },
        config:{ live:false, speed:1.0, ticker_text:"MiTV Network", ticker_color:"#FFFFFF", ticker_font:"Noto Naskh Arabic", ticker_size:34,
                  ticker_bar_height:60, ticker_direction:"rtl", ticker_speed:130,
                  nownext_enabled:true, ad_enabled:false, ad_url:"",
                  schedule_time:"", schedule_video_url:"", youtube_key:"", rtmp_url:"rtmp://a.rtmp.youtube.com/live2" },
        playlist:{}
      });
    }
  });

  // ---------------------------------------------------------------
  // Live sync: all channels -> tabs
  // ---------------------------------------------------------------
  channelsRef.on('value', snap=>{
    channelsCache = snap.val() || {};
    renderTabs();
    if(!activeChannelId || !channelsCache[activeChannelId]){
      const ids = Object.keys(channelsCache);
      activeChannelId = ids.length ? ids[0] : null;
    }
    renderChannelPanel();
  });

  function renderTabs(){
    const tabs = document.getElementById('channelTabs');
    tabs.innerHTML = '';
    Object.entries(channelsCache).forEach(([id, ch])=>{
      const state = (ch.status && ch.status.state) || 'IDLE';
      const div = document.createElement('div');
      div.className = 'ch-tab' + (id === activeChannelId ? ' active' : '');
      div.innerHTML = `<span class="dot ${state==='LIVE'?'live':state==='ERROR'?'error':''}"></span>${escapeHtml(ch.meta?.name || id)}`;
      div.addEventListener('click', ()=>{ activeChannelId = id; renderTabs(); renderChannelPanel(); });
      tabs.appendChild(div);
    });
    const addTab = document.createElement('div');
    addTab.className = 'ch-tab add';

  // HLS auto-play preview: attaches hls.js to the M3U8 link Firebase

  // ---------------------------------------------------------------
  let hlsInstance = null;
  function attachHlsPreview(hlsUrl, youtubeId){
    const frame = document.getElementById('previewFrame');
    const video = document.getElementById('hlsVideo');
    const placeholder = document.getElementById('previewPlaceholder');
    const badge = document.getElementById('previewBadge');
    if(!frame || !video) return;

    if(hlsInstance){ hlsInstance.destroy(); hlsInstance = null; }
    const existingIframe = frame.querySelector('iframe');
    if(existingIframe) existingIframe.remove();

    if(hlsUrl){
      if(badge) badge.textContent = 'M3U8';
      video.style.display = 'block';
      placeholder.style.display = 'none';
      if(window.Hls && Hls.isSupported()){
        hlsInstance = new Hls({ liveDurationInfinity: true, maxLiveSyncPlaybackRate: 1.2 });
        hlsInstance.loadSource(hlsUrl);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.ERROR, (evt, data)=>{
          if(data.fatal){
            placeholder.textContent = 'Stream not reachable yet — will retry automatically once the channel is live';
            video.style.display = 'none';
            placeholder.style.display = 'flex';
          }
        });
      } else if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src = hlsUrl; // native HLS (Safari/iOS)
      }
      video.play().catch(()=>{});
    } else if(youtubeId){
      if(badge) badge.textContent = 'YOUTUBE';
      video.style.display = 'none';
      placeholder.style.display = 'none';
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=0`;
      iframe.allowFullscreen = true;
      frame.appendChild(iframe);
    } else {
      if(badge) badge.textContent = 'OFFLINE';
      video.style.display = 'none';
      placeholder.style.display = 'flex';
      placeholder.textContent = 'Waiting for stream — this fills automatically once the channel goes live';
    }
  }

  function renderPlaylist(playlist, currentTitle){
    const container = document.getElementById('playlistContainer');
    if(!playlist || !Object.keys(playlist).length){
      container.innerHTML = '<div class="hint">Playlist is empty. Add a video below.</div>';
      return;
    }
    container.innerHTML = '';
    Object.entries(playlist).forEach(([key, item])=>{
      const div = document.createElement('div');
      div.className = 'playlist-item' + (item.title === currentTitle ? ' now' : '');
      div.innerHTML = `
        <div class="info">
          <div class="title">${item.title === currentTitle ? '▶ ' : ''}${escapeHtml(item.title || 'Untitled')}</div>
          <div class="url">${escapeHtml(item.url || '')}</div>
        </div>
        <button class="icon-btn del" data-key="${key}">🗑</button>
      `;
      container.appendChild(div);
    });
    container.querySelectorAll('.del').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        channelsRef.child(activeChannelId).child('playlist').child(btn.dataset.key).remove()
          .then(()=> toast("Video removed"));
      });
    });
  }

  function metaRef(){ return channelsRef.child(activeChannelId).child('meta'); }

  function bindPanelEvents(){
    document.getElementById('liveToggle').addEventListener('change', e=>{
      cfgRef().update({live: e.target.checked});
      toast(e.target.checked ? "Going live…" : "Stopping stream…");
    });

    const speedSlider = document.getElementById('speedSlider');
    speedSlider.addEventListener('input', e=>{
      document.getElementById('speedVal').textContent = parseFloat(e.target.value).toFixed(2) + 'x';
    });
    speedSlider.addEventListener('change', e=>{
      const v = parseFloat(e.target.value);
      cfgRef().update({speed: v}).then(()=> toast(`Speed set to ${v.toFixed(2)}x`));
    });

    const logoX = document.getElementById('logoX');
    const logoY = document.getElementById('logoY');
    const logoW = document.getElementById('logoW');
    logoX.addEventListener('input', e=>{
      document.getElementById('logoXVal').textContent = e.target.value + '%';
      updateLogoDot(e.target.value, logoY.value);
    });
    logoY.addEventListener('input', e=>{
      document.getElementById('logoYVal').textContent = e.target.value + '%';
      updateLogoDot(logoX.value, e.target.value);
    });
    logoW.addEventListener('input', e=>{
      document.getElementById('logoWVal').textContent = e.target.value + 'px';
    });
    [logoX, logoY, logoW].forEach(el=>{
      el.addEventListener('change', ()=>{
        metaRef().update({
          logo_x: parseFloat(logoX.value),
          logo_y: parseFloat(logoY.value),
          logo_width: parseInt(logoW.value, 10)
        }).then(()=> toast("Logo position saved"));
      });
    });

    const tickerSize = document.getElementById('tickerSize');
    tickerSize.addEventListener('input', e=>{
      document.getElementById('tickerSizeVal').textContent = e.target.value + 'px';
    });

    const barHeight = document.getElementById('barHeight');
    barHeight.addEventListener('input', e=>{
      document.getElementById('barHeightVal').textContent = e.target.value + 'px';
    });

    const tickerSpeed = document.getElementById('tickerSpeed');
    tickerSpeed.addEventListener('input', e=>{
      document.getElementById('tickerSpeedVal').textContent = e.target.value + ' px/s';
    });

    // Live font/text preview - updates instantly as you type or pick a font,
    // before saving, so you can see the style before it goes on-air.
    const fontPreview = document.getElementById('fontPreview');
    const tickerFontSel = document.getElementById('tickerFont');
    const tickerTextArea = document.getElementById('tickerText');
    const tickerColorInput = document.getElementById('tickerColor');
    function refreshFontPreview(){
      if(!fontPreview) return;
      fontPreview.style.fontFamily = FONT_PREVIEW_MAP[tickerFontSel.value] || 'sans-serif';
      fontPreview.style.fontWeight = tickerFontSel.value.includes('Bold') ? '700' : '400';
      fontPreview.style.color = tickerColorInput.value || 'var(--accent)';
      fontPreview.textContent = tickerTextArea.value.trim() || 'MiTV Network';
    }
    tickerFontSel.addEventListener('change', refreshFontPreview);
    tickerTextArea.addEventListener('input', refreshFontPreview);
    tickerColorInput.addEventListener('input', refreshFontPreview);
    refreshFontPreview();

    document.getElementById('saveTicker').addEventListener('click', ()=>{
      cfgRef().update({
        ticker_text: document.getElementById('tickerText').value.trim(),
        ticker_color: document.getElementById('tickerColor').value,
        ticker_font: document.getElementById('tickerFont').value,
        ticker_direction: document.getElementById('tickerDirection').value,
        ticker_size: parseInt(tickerSize.value, 10),
        ticker_bar_height: parseInt(barHeight.value, 10),
        ticker_speed: parseInt(tickerSpeed.value, 10),
        nownext_enabled: document.getElementById('nownextToggle').checked
      }).then(()=> toast("Ticker updated — live from the next video"));
    });

    document.getElementById('saveSchedule').addEventListener('click', ()=>{
      const time = document.getElementById('schedTime').value;
      const url = document.getElementById('schedUrl').value.trim();
      if(!time || !url){ toast("Enter both time and video URL"); return; }
      cfgRef().update({schedule_time: time, schedule_video_url: url}).then(()=> toast("Schedule saved"));
    });
    document.getElementById('clearSchedule').addEventListener('click', ()=>{
      cfgRef().update({schedule_time: "", schedule_video_url: ""}).then(()=> toast("Schedule cleared"));
    });

    document.getElementById('saveAd').addEventListener('click', ()=>{
      cfgRef().update({
        ad_enabled: document.getElementById('adToggle').checked,
        ad_url: document.getElementById('adUrl').value.trim()
      }).then(()=> toast("Ad settings saved"));
    });

    document.getElementById('saveRtmp').addEventListener('click', ()=>{
      const youtube_key = document.getElementById('ytKey').value.trim();
      if(!youtube_key){ toast("Enter your YouTube stream key"); return; }
      cfgRef().update({
        rtmp_url: document.getElementById('rtmpUrl').value.trim(),
        youtube_key
      }).then(()=> toast("RTMP settings saved"));
    });

    document.getElementById('addVideo').addEventListener('click', ()=>{
      const title = document.getElementById('newTitle').value.trim();
      const url = document.getElementById('newUrl').value.trim();
      if(!title || !url){ toast("Enter title and URL"); return; }
      channelsRef.child(activeChannelId).child('playlist').push({title, url}).then(()=>{
        document.getElementById('newTitle').value = '';
        document.getElementById('newUrl').value = '';
        toast("Video added");
      });
    });

    document.getElementById('saveIdentity').addEventListener('click', ()=>{
      const activeSwatch = document.querySelector('.theme-swatch.active');
      metaRef().update({
        name: document.getElementById('chName').value.trim() || activeChannelId,
        logo_url: document.getElementById('chLogo').value.trim(),
        theme: activeSwatch ? activeSwatch.dataset.t : 'gold'
      }).then(()=> toast("Channel identity saved"));
    });

    document.getElementById('themeRow').addEventListener('click', e=>{
      const sw = e.target.closest('.theme-swatch'); if(!sw) return;
      document.querySelectorAll('.theme-swatch').forEach(s=> s.classList.remove('active'));
      sw.classList.add('active');
      document.body.setAttribute('data-theme', sw.dataset.t);
    });

    document.getElementById('deleteChannel').addEventListener('click', ()=>{
      if(!confirm(`Delete channel "${activeChannelId}"? This cannot be undone.`)) return;
      channelsRef.child(activeChannelId).remove().then(()=>{
        activeChannelId = null;
        toast("Channel deleted");
      });
    });

    document.getElementById('saveYtId').addEventListener('click', ()=>{
      metaRef().update({youtube_video_id: document.getElementById('ytVideoId').value.trim()})
        .then(()=> toast("Preview video ID saved"));
    });

    document.getElementById('copyM3u').addEventListener('click', ()=>{
      const val = document.getElementById('m3uLink').value;
      navigator.clipboard.writeText(val).then(()=> toast("M3U link copied"));
    });

    attachHlsPreview(status.hls_url || '', meta.youtube_video_id || '');

    document.getElementById('copyHlsLink').addEventListener('click', ()=>{
      const val = document.getElementById('hlsLink').value;
      navigator.clipboard.writeText(val).then(()=> toast("M3U8 link copied"));
    });

    document.getElementById('saveM3uSettings').addEventListener('click', ()=>{
      engineBaseUrl = document.getElementById('engineBaseUrl').value.trim();
      localStorage.setItem('mitv_engine_base', engineBaseUrl);
      metaRef().update({public_stream_url: document.getElementById('publicStreamUrl').value.trim()})
        .then(()=>{ toast("M3U settings saved"); renderChannelPanel(); });
    });
  }
</script>
</body>
</html>
